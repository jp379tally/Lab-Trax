name: Auto-tag Desktop release on merge to main

# Runs on every push to main that touches code which can affect the LabTrax
# Desktop build. Bumps the patch version in artifacts/labtrax-desktop/package.json,
# commits the bump back to main, and pushes a new `vX.Y.Z` tag. That tag push
# triggers the existing `Release` workflow (.github/workflows/release.yml),
# which builds + signs + publishes the installer.
#
# Why a separate workflow (vs. modifying release.yml directly)?
#  - release.yml is already complex (build-number allocation, signing,
#    notarization, atomic publish). Keeping the tag-only path out of band
#    lets us reason about each concern in isolation, and lets release.yml
#    keep being usable by hand-pushed tags during incident response.
#
# Why pushes need BUILD_BOT_TOKEN:
#  - GitHub Actions deliberately does NOT trigger workflows from refs
#    created using the default GITHUB_TOKEN. If the tag is pushed with
#    GITHUB_TOKEN, release.yml will NOT fire and nothing gets built.
#    BUILD_BOT_TOKEN is a fine-grained PAT (Contents: Read & Write +
#    bypass branch protection) already configured in the repo and reused
#    here for that side-effect.

on:
  # Manual trigger only. Auto-tagging on every push was disabled because:
  #  1. The bot commits it pushed back to GitHub main diverged from Replit's
  #     history (Replit is the source of truth), requiring a force-push to
  #     resync after every activation.
  #  2. release.yml fired automatically and failed loudly (no signing secrets
  #     configured), flooding the inbox with GitHub Actions failure emails.
  # To cut a new desktop release: run this workflow manually from the
  # GitHub Actions tab, OR push a `v*` tag directly.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialize tag bumps on main so two near-simultaneous merges can't both
  # try to allocate the same vX.Y.Z. Don't cancel in flight — we always
  # want every queued merge to get its own tag.
  group: auto-tag-desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    # Opt-out: include `[skip desktop-release]` (or the standard `[skip ci]`)
    # in the merge commit subject/body to suppress the auto-release.
    if: >-
      !contains(github.event.head_commit.message, '[skip desktop-release]')
      && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # See "Why pushes need BUILD_BOT_TOKEN" at the top of this file.
          token: ${{ secrets.BUILD_BOT_TOKEN || github.token }}

      # Defensive guard: this workflow is workflow_dispatch-only, so GitHub's
      # path filters (paths/paths-ignore) do not apply. Compute the set of files
      # changed since the last release and decide whether any of them can affect
      # the desktop build. Mobile-only changes (artifacts/labtrax/**), docs, and
      # the mockup sandbox must NOT cut a desktop release. The diff base is the
      # latest v* tag (the last release point); if no tag exists, fall back to
      # the previous commit. No `secrets` are referenced in this step.
      - name: Determine whether changes are desktop-relevant
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          # Pick a diff base: the most recent v* tag, else the parent commit.
          BASE=""
          if LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null); then
            BASE="$LATEST_TAG"
            echo "Diff base: latest tag ${BASE}"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
            echo "Diff base: no v* tag found, using HEAD~1"
          else
            echo "::notice::No diff base available (single-commit history) — treating as desktop-relevant."
            echo "desktop_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE}" HEAD)
          if [[ -z "$CHANGED" ]]; then
            echo "::notice::No file changes since ${BASE} — skipping desktop release."
            echo "desktop_relevant=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files since ${BASE}:"
          echo "$CHANGED"

          # A change is desktop-relevant if any file is outside the set of
          # paths known NOT to affect the desktop build. Desktop-relevant roots
          # include artifacts/labtrax-desktop/**, artifacts/api-server/**, lib/**
          # and anything not explicitly excluded below.
          NON_DESKTOP_REGEX='^(artifacts/labtrax/|artifacts/mockup-sandbox/|docs/|\.local/)'
          RELEVANT="false"
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if [[ ! "$f" =~ $NON_DESKTOP_REGEX ]]; then
              RELEVANT="true"
              echo "Desktop-relevant change detected: $f"
              break
            fi
          done <<< "$CHANGED"

          if [[ "$RELEVANT" == "true" ]]; then
            echo "::notice::Desktop-relevant changes detected — proceeding with release tag."
            echo "desktop_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Only non-desktop changes (mobile/docs/mockup) since ${BASE} — skipping desktop release."
            echo "desktop_relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version, commit, and push tag
        id: tag
        if: ${{ steps.scope.outputs.desktop_relevant == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(node -p "require('./artifacts/labtrax-desktop/package.json').version")
          if [[ ! "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::package.json version '$CURRENT' is not a clean semver triple — refusing to auto-bump."
            exit 1
          fi
          MAJ="${BASH_REMATCH[1]}"
          MIN="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          NEXT="${MAJ}.${MIN}.$((PATCH + 1))"
          TAG="v${NEXT}"

          # Skip cleanly if the next tag already exists (e.g. a re-run of
          # the same merge). Pushing the same tag again would be a no-op
          # but a manually-created tag at the same point could surprise us.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::Tag ${TAG} already exists on origin — skipping bump."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "
            const fs = require('fs');
            const p = 'artifacts/labtrax-desktop/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '${NEXT}';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "

          git add artifacts/labtrax-desktop/package.json
          # [skip ci] on the bump commit prevents this workflow from
          # re-triggering itself; the tag push will still trigger release.yml.
          git commit -m "chore(desktop): release ${TAG} [skip ci]"
          git tag -a "${TAG}" -m "LabTrax Desktop ${TAG}"

          # Push the bump first, then the tag. Order matters: release.yml
          # checks out the tag's tree and reads package.json from it, so
          # the tag must point at a commit whose package.json carries the
          # new version.
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Created and pushed ${TAG} — release.yml will now build and publish."

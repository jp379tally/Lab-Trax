name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # BUILD_BOT_TOKEN should be a fine-grained PAT (or GitHub App token)
          # with "bypass branch protection" rights so the build-number commit-back
          # push succeeds even when main requires a PR or status checks.
          # Falls back to the default GITHUB_TOKEN on repos with no branch
          # protection — callers that have not set the secret get the old behaviour.
          token: ${{ secrets.BUILD_BOT_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require signing secrets
        shell: bash
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" ]]; then
            echo "::error::WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets must be set for tagged release builds. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build and package Windows installer
        # GH_TOKEN is intentionally omitted — electron-builder would otherwise
        # try to publish directly to a GitHub Release, creating a partial release
        # before the macOS build finishes. The publish-release job handles
        # creating the single unified release after both builds succeed.
        #
        # Without GH_TOKEN, electron-builder still writes all output files
        # (installer, latest.yml, blockmap) to electron-dist locally — we
        # capture them via upload-artifact below.
        run: pnpm --filter @workspace/labtrax-desktop run electron:build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      # Persist the incremented build-number.json back to main so the counter
      # stays monotonically increasing across releases.
      #
      # This workflow is triggered by a tag push, so the runner operates on a
      # detached HEAD — git pull --rebase has no current branch to rebase onto.
      # Instead we:
      #   1. Read the bumped number from the working tree (tag checkout).
      #   2. Fetch main and switch to it as a real local branch.
      #   3. Write the exact bumped value onto main's copy of the file.
      #   4. Commit (no-op if a parallel job already pushed the same value).
      #   5. Push with fetch+rebase retry; fail hard if all attempts exhaust.
      # [skip ci] prevents the maintenance commit from re-triggering CI.
      - name: Commit bumped build number
        id: commit-build-number
        if: success()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Read the number from the tag working tree before switching branches.
          BUILD_NUM=$(node -p "require('./artifacts/labtrax-desktop/build-number.json').buildNumber")
          # Tags are immutable — commit to main instead.
          git fetch origin main
          git checkout -B main origin/main
          # Write the bumped value onto main's copy of the file.
          node -e "
            const fs = require('fs'), p = 'artifacts/labtrax-desktop/build-number.json';
            const d = JSON.parse(fs.readFileSync(p, 'utf8'));
            d.buildNumber = $BUILD_NUM;
            fs.writeFileSync(p, JSON.stringify(d, null, 2) + '\n', 'utf8');
          "
          git add artifacts/labtrax-desktop/build-number.json
          if git diff --cached --quiet; then
            echo "build-number.json already at ${BUILD_NUM} on main — nothing to commit."
            exit 0
          fi
          git commit -m "chore: bump desktop build number to ${BUILD_NUM} [skip ci]"
          # Retry with fetch+rebase on conflict (parallel macOS/Windows race).
          # After rebase, re-check if the file is already at the target value —
          # if so, the other job already persisted it and no push is needed.
          pushed=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — retrying in ${attempt}s…"
            git fetch origin main
            git rebase origin/main
            if git diff origin/main --quiet -- artifacts/labtrax-desktop/build-number.json; then
              echo "build-number.json already at ${BUILD_NUM} on origin/main — no push needed."
              pushed=true
              break
            fi
            sleep "$attempt"
          done
          if [[ "$pushed" != "true" ]]; then
            echo "::error::All push attempts failed — build number was NOT persisted. The counter may reset on the next checkout."
            exit 1
          fi

      # Alert admins when the build-number commit fails to push so the silent
      # counter-reset bug is caught immediately rather than discovered later.
      # Uses the same opt-in gating as the publish-failure alert: both secrets
      # must be set, otherwise the step skips without error.
      - name: Notify admins on build-number push failure
        if: always() && steps.commit-build-number.outcome == 'failure'
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping build-number push failure alert — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg workflowName "${GITHUB_WORKFLOW}" \
            --arg runUrl "$RUN_URL" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commitSha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg stage "build-number-commit" \
            --arg errorMessage "All 3 push attempts to persist build-number.json to main failed (triggered by tag ${GITHUB_REF_NAME}). The build number counter may reset on the next checkout — check branch protection rules or network connectivity." \
            '{workflowName:$workflowName, runUrl:$runUrl, runId:$runId, commitSha:$commitSha, ref:$ref, stage:$stage, errorMessage:$errorMessage}')
          echo "Reporting build-number push failure to $BASE_URL/api/admin/desktop-installer/publish-failure"
          NOTIFY_BODY=$(mktemp)
          NOTIFY_STATUS=$(curl --silent --show-error --output "$NOTIFY_BODY" --write-out '%{http_code}' \
            -X POST \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$BASE_URL/api/admin/desktop-installer/publish-failure") || true
          NOTIFY_STATUS="${NOTIFY_STATUS:-000}"
          cat "$NOTIFY_BODY"; echo
          if [[ ! "$NOTIFY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 500 "$NOTIFY_BODY")
            echo "::warning::Failed to deliver build-number push failure alert (HTTP $NOTIFY_STATUS): $BODY_TRUNC — admins will not receive an email for this run."
          fi

      - name: Verify installer signature
        if: env.CSC_LINK != ''
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $installers = Get-ChildItem -Path "artifacts/labtrax-desktop/electron-dist" -Filter "*.exe" -ErrorAction Stop
          if ($installers.Count -eq 0) {
            Write-Host "::error::No .exe installer found in artifacts/labtrax-desktop/electron-dist."
            exit 1
          }
          $failed = $false
          foreach ($installer in $installers) {
            Write-Host "Verifying signature: $($installer.Name)"
            signtool verify /pa /v "$($installer.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Signature verification FAILED for $($installer.Name)."
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All installers passed signature verification."

      # Auto-publish the freshly built installer to the live download page so
      # admins don't have to download → upload → update URL by hand. Gated by
      # the PLATFORM_ADMIN_SECRET and PUBLISH_API_BASE_URL secrets — if either
      # is unset, this step logs a notice and exits 0 (safe to disable).
      - name: Publish installer to live download page
        id: publish
        if: success()
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          set -uo pipefail
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping auto-publish — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL secret not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          # electron-builder is configured to emit a stable filename
          # (electron-builder.yml → nsis.artifactName: LabTrax-Setup.exe), so
          # select it explicitly rather than globbing — avoids ambiguity if
          # additional .exe artifacts ever land in electron-dist.
          INSTALLER_PATH="artifacts/labtrax-desktop/electron-dist/LabTrax-Setup.exe"
          # Expose context for the on-failure notify step (see the next step).
          echo "stage=unknown" >> "$GITHUB_OUTPUT"
          if [[ ! -f "$INSTALLER_PATH" ]]; then
            echo "stage=upload" >> "$GITHUB_OUTPUT"
            echo "error_message=Installer not found at $INSTALLER_PATH" >> "$GITHUB_OUTPUT"
            echo "::error::Installer not found at $INSTALLER_PATH; cannot publish."
            exit 1
          fi
          # Prefer the git tag (e.g. v1.2.3 → 1.2.3); fall back to package.json.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="$TAG_VERSION"
          else
            VERSION=$(node -p "require('./artifacts/labtrax-desktop/package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "stage=upload" >> "$GITHUB_OUTPUT"
          echo "Uploading $INSTALLER_PATH to $BASE_URL/api/admin/desktop-installer/upload"
          UPLOAD_BODY=$(mktemp)
          # Capture only the HTTP status; on transport failure curl emits no
          # status, so default to 000. Use a single assignment (no `|| echo`
          # fallback chain) to avoid ambiguous multi-line output.
          UPLOAD_STATUS=$(curl --silent --show-error --output "$UPLOAD_BODY" --write-out '%{http_code}' \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -F "file=@${INSTALLER_PATH};type=application/vnd.microsoft.portable-executable" \
            "$BASE_URL/api/admin/desktop-installer/upload") || true
          UPLOAD_STATUS="${UPLOAD_STATUS:-000}"
          cat "$UPLOAD_BODY"; echo
          if [[ ! "$UPLOAD_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 1500 "$UPLOAD_BODY")
            {
              echo "http_status=$UPLOAD_STATUS"
              echo 'error_message<<__EOF__'
              printf '%s\n' "$BODY_TRUNC"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
            echo "::error::Installer upload failed (HTTP $UPLOAD_STATUS): $BODY_TRUNC"
            exit 1
          fi
          echo "stage=settings" >> "$GITHUB_OUTPUT"
          echo "Updating live download URL → /downloads/LabTrax-Setup.exe (version $VERSION)"
          NOTES=$(node -e "
const fs = require('fs');
const ver = 'v${VERSION}';
let raw;
try { raw = fs.readFileSync('artifacts/labtrax-desktop/RELEASE_NOTES.md', 'utf8'); } catch { process.exit(0); }
const lines = raw.split(/\r?\n/);
let inBlock = false, out = [];
for (const line of lines) {
  if (/^## v/.test(line)) {
    if (inBlock) break;
    if (line.replace(/^##\s+/, '').trim() === ver) inBlock = true;
    continue;
  }
  if (inBlock) out.push(line);
}
process.stdout.write(out.join('\n').trim());
" 2>/dev/null) || true
          if [[ -z "$NOTES" ]]; then
            NOTES="Auto-published from release ${GITHUB_REF_NAME} (run ${GITHUB_RUN_ID}, commit ${GITHUB_SHA})."
            echo "::notice::No entry for v${VERSION} found in RELEASE_NOTES.md — using generic notes."
          else
            echo "::notice::Using release notes for v${VERSION} from RELEASE_NOTES.md."
          fi
          SETTINGS_BODY=$(mktemp)
          SETTINGS_STATUS=$(curl --silent --show-error --output "$SETTINGS_BODY" --write-out '%{http_code}' \
            -X PUT \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg url "/downloads/LabTrax-Setup.exe" --arg ver "$VERSION" --arg notes "$NOTES" '{downloadUrl:$url, version:$ver, releaseNotes:$notes}')" \
            "$BASE_URL/api/admin/settings/desktop-installer") || true
          SETTINGS_STATUS="${SETTINGS_STATUS:-000}"
          cat "$SETTINGS_BODY"; echo
          if [[ ! "$SETTINGS_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 1500 "$SETTINGS_BODY")
            {
              echo "http_status=$SETTINGS_STATUS"
              echo 'error_message<<__EOF__'
              printf '%s\n' "$BODY_TRUNC"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
            echo "::error::Installer settings update failed (HTTP $SETTINGS_STATUS): $BODY_TRUNC"
            exit 1
          fi
          echo "::notice::Published LabTrax-Setup.exe v$VERSION to $BASE_URL"

      # Email the platform admin recipient list when the auto-publish step
      # above fails so the lab finds out within minutes instead of waiting for
      # a customer to complain. Inherits the same opt-in gating: if either
      # PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL is unset, we skip
      # silently (the publish step also skipped).
      - name: Notify admins on publish failure
        if: always() && steps.publish.outcome == 'failure'
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
          STAGE: ${{ steps.publish.outputs.stage }}
          HTTP_STATUS: ${{ steps.publish.outputs.http_status }}
          ERROR_MESSAGE: ${{ steps.publish.outputs.error_message }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping publish-failure alert — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg workflowName "${GITHUB_WORKFLOW}" \
            --arg runUrl "$RUN_URL" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commitSha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg version "${VERSION:-}" \
            --arg stage "${STAGE:-unknown}" \
            --arg httpStatus "${HTTP_STATUS:-}" \
            --arg errorMessage "${ERROR_MESSAGE:-}" \
            '{workflowName:$workflowName, runUrl:$runUrl, runId:$runId, commitSha:$commitSha, ref:$ref, version:$version, stage:$stage, errorMessage:$errorMessage} + (if $httpStatus == "" then {} else {httpStatus: ($httpStatus | tonumber)} end)')
          echo "Reporting publish failure to $BASE_URL/api/admin/desktop-installer/publish-failure"
          NOTIFY_BODY=$(mktemp)
          NOTIFY_STATUS=$(curl --silent --show-error --output "$NOTIFY_BODY" --write-out '%{http_code}' \
            -X POST \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$BASE_URL/api/admin/desktop-installer/publish-failure") || true
          NOTIFY_STATUS="${NOTIFY_STATUS:-000}"
          cat "$NOTIFY_BODY"; echo
          if [[ ! "$NOTIFY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 500 "$NOTIFY_BODY")
            echo "::warning::Failed to deliver publish-failure alert (HTTP $NOTIFY_STATUS): $BODY_TRUNC — admins will not receive an email for this run."
          fi

      - name: Upload Windows release assets
        # Upload the installer, auto-update manifest (latest.yml), and blockmap.
        # latest.yml is required by electron-updater to discover and verify new
        # versions — without it, auto-update silently fails for existing installs.
        uses: actions/upload-artifact@v4
        with:
          name: LabTrax-Windows-Assets
          path: |
            artifacts/labtrax-desktop/electron-dist/*.exe
            artifacts/labtrax-desktop/electron-dist/*.exe.blockmap
            artifacts/labtrax-desktop/electron-dist/latest.yml
          if-no-files-found: error

  # ── macOS build ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # BUILD_BOT_TOKEN should be a fine-grained PAT (or GitHub App token)
          # with "bypass branch protection" rights so the build-number commit-back
          # push succeeds even when main requires a PR or status checks.
          # Falls back to the default GITHUB_TOKEN on repos with no branch
          # protection — callers that have not set the secret get the old behaviour.
          token: ${{ secrets.BUILD_BOT_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require signing and notarization secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$CSC_LINK" ]]                    && missing+=("MACOS_CERTIFICATE")
          [[ -z "$CSC_KEY_PASSWORD" ]]            && missing+=("MACOS_CERTIFICATE_PASSWORD")
          [[ -z "$APPLE_ID" ]]                    && missing+=("APPLE_ID")
          [[ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -z "$APPLE_TEAM_ID" ]]               && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::The following GitHub Actions secrets must be set for tagged release builds:"
            for s in "${missing[@]}"; do echo "  • $s"; done
            echo ""
            echo "Add them in Settings → Secrets and variables → Actions."
            echo ""
            echo "Required secrets:"
            echo "  MACOS_CERTIFICATE             — base64-encoded .p12 Developer ID Application certificate"
            echo "                                  (encode with: base64 -i certificate.p12 | tr -d '\\n')"
            echo "  MACOS_CERTIFICATE_PASSWORD    — password protecting the .p12 file"
            echo "  APPLE_ID                      — Apple ID email (App Store Connect account)"
            echo "  APPLE_APP_SPECIFIC_PASSWORD   — app-specific password for the Apple ID"
            echo "                                  (generate at appleid.apple.com → Sign-In and Security)"
            echo "  APPLE_TEAM_ID                 — 10-character Team ID from developer.apple.com/account"
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and notarize macOS DMG
        # GH_TOKEN is intentionally omitted — see the Windows build job for the
        # rationale. The zip targets are built alongside the DMG because
        # electron-updater uses them as the auto-update payload on macOS.
        run: pnpm --filter @workspace/labtrax-desktop run electron:build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          ELECTRON_PLATFORM: mac
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Mirror the Windows commit-back step exactly. Both platform jobs start
      # from the same tag commit (detached HEAD), increment build-number to the
      # same N+1, and race to push to main. The same fetch+checkout-main +
      # retry-rebase logic is used here so the second arrival is a no-op:
      # after rebasing it sees the file already at N+1 and exits cleanly.
      - name: Commit bumped build number
        id: commit-build-number
        if: success()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Read the number from the tag working tree before switching branches.
          BUILD_NUM=$(node -p "require('./artifacts/labtrax-desktop/build-number.json').buildNumber")
          # Tags are immutable — commit to main instead.
          git fetch origin main
          git checkout -B main origin/main
          # Write the bumped value onto main's copy of the file.
          node -e "
            const fs = require('fs'), p = 'artifacts/labtrax-desktop/build-number.json';
            const d = JSON.parse(fs.readFileSync(p, 'utf8'));
            d.buildNumber = $BUILD_NUM;
            fs.writeFileSync(p, JSON.stringify(d, null, 2) + '\n', 'utf8');
          "
          git add artifacts/labtrax-desktop/build-number.json
          if git diff --cached --quiet; then
            echo "build-number.json already at ${BUILD_NUM} on main — nothing to commit."
            exit 0
          fi
          git commit -m "chore: bump desktop build number to ${BUILD_NUM} [skip ci]"
          # Retry with fetch+rebase on conflict (parallel macOS/Windows race).
          # After rebase, re-check if the file is already at the target value —
          # if so, the other job already persisted it and no push is needed.
          pushed=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — retrying in ${attempt}s…"
            git fetch origin main
            git rebase origin/main
            if git diff origin/main --quiet -- artifacts/labtrax-desktop/build-number.json; then
              echo "build-number.json already at ${BUILD_NUM} on origin/main — no push needed."
              pushed=true
              break
            fi
            sleep "$attempt"
          done
          if [[ "$pushed" != "true" ]]; then
            echo "::error::All push attempts failed — build number was NOT persisted. The counter may reset on the next checkout."
            exit 1
          fi

      # Alert admins when the build-number commit fails to push so the silent
      # counter-reset bug is caught immediately rather than discovered later.
      # Uses the same opt-in gating as the publish-failure alert: both secrets
      # must be set, otherwise the step skips without error.
      - name: Notify admins on build-number push failure
        if: always() && steps.commit-build-number.outcome == 'failure'
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping build-number push failure alert — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg workflowName "${GITHUB_WORKFLOW}" \
            --arg runUrl "$RUN_URL" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commitSha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg stage "build-number-commit" \
            --arg errorMessage "All 3 push attempts to persist build-number.json to main failed (triggered by tag ${GITHUB_REF_NAME}). The build number counter may reset on the next checkout — check branch protection rules or network connectivity." \
            '{workflowName:$workflowName, runUrl:$runUrl, runId:$runId, commitSha:$commitSha, ref:$ref, stage:$stage, errorMessage:$errorMessage}')
          echo "Reporting build-number push failure to $BASE_URL/api/admin/desktop-installer/publish-failure"
          NOTIFY_BODY=$(mktemp)
          NOTIFY_STATUS=$(curl --silent --show-error --output "$NOTIFY_BODY" --write-out '%{http_code}' \
            -X POST \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$BASE_URL/api/admin/desktop-installer/publish-failure") || true
          NOTIFY_STATUS="${NOTIFY_STATUS:-000}"
          cat "$NOTIFY_BODY"; echo
          if [[ ! "$NOTIFY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 500 "$NOTIFY_BODY")
            echo "::warning::Failed to deliver build-number push failure alert (HTTP $NOTIFY_STATUS): $BODY_TRUNC — admins will not receive an email for this run."
          fi

      # Auto-publish the freshly built DMG to the live download page so
      # admins don't have to download → upload → update URL by hand. Mirrors
      # the Windows build job's publish step. Gated by the same secrets — if
      # either is unset, this step logs a notice and exits 0 (safe to disable).
      - name: Publish DMG to live download page
        if: success()
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping auto-publish — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL secret not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          # electron-builder produces one DMG per arch (arm64 + x64), plus a
          # universal DMG if configured. The live download page exposes a
          # single /downloads/LabTrax.dmg slot, so we have to pick one for
          # broadest compatibility:
          #   1. universal — runs natively on both chips, ideal if present
          #   2. x64      — runs natively on Intel and via Rosetta 2 on
          #                 Apple Silicon (Rosetta translates x64→arm64,
          #                 NOT the reverse, so an arm64 DMG would be
          #                 unusable on Intel Macs)
          #   3. arm64    — last-resort fallback (Apple-Silicon-only)
          # nullglob keeps unmatched globs from leaving literal patterns
          # in the array (which would otherwise trip the [[ -f ]] check).
          shopt -s nullglob
          DIST_DIR="artifacts/labtrax-desktop/electron-dist"
          UNIVERSAL=( "$DIST_DIR"/*universal*.dmg )
          X64=( "$DIST_DIR"/*x64*.dmg )
          ARM64=( "$DIST_DIR"/*arm64*.dmg )
          ANY=( "$DIST_DIR"/*.dmg )
          shopt -u nullglob
          INSTALLER_PATH=""
          if   (( ${#UNIVERSAL[@]} > 0 )); then INSTALLER_PATH="${UNIVERSAL[0]}"
          elif (( ${#X64[@]} > 0 ));       then INSTALLER_PATH="${X64[0]}"
          elif (( ${#ARM64[@]} > 0 ));     then INSTALLER_PATH="${ARM64[0]}"
          elif (( ${#ANY[@]} > 0 ));       then INSTALLER_PATH="${ANY[0]}"
          fi
          if [[ -z "$INSTALLER_PATH" || ! -f "$INSTALLER_PATH" ]]; then
            echo "::error::No DMG found in $DIST_DIR; cannot publish."
            exit 1
          fi
          # Prefer the git tag (e.g. v1.2.3 → 1.2.3); fall back to package.json.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="$TAG_VERSION"
          else
            VERSION=$(node -p "require('./artifacts/labtrax-desktop/package.json').version")
          fi
          echo "Uploading $INSTALLER_PATH to $BASE_URL/api/admin/desktop-installer/upload"
          # The API normalises the stored filename to LabTrax.dmg regardless
          # of the original arch-suffixed name, so the upload itself doesn't
          # need a rename. Set the content-type explicitly because some macOS
          # runners report DMGs as application/octet-stream.
          curl --fail-with-body --show-error --silent \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -F "file=@${INSTALLER_PATH};type=application/x-apple-diskimage;filename=LabTrax.dmg" \
            "$BASE_URL/api/admin/desktop-installer/upload"
          echo
          echo "Updating live download URL → /downloads/LabTrax.dmg (version $VERSION)"
          NOTES=$(node -e "
const fs = require('fs');
const ver = 'v${VERSION}';
let raw;
try { raw = fs.readFileSync('artifacts/labtrax-desktop/RELEASE_NOTES.md', 'utf8'); } catch { process.exit(0); }
const lines = raw.split(/\r?\n/);
let inBlock = false, out = [];
for (const line of lines) {
  if (/^## v/.test(line)) {
    if (inBlock) break;
    if (line.replace(/^##\s+/, '').trim() === ver) inBlock = true;
    continue;
  }
  if (inBlock) out.push(line);
}
process.stdout.write(out.join('\n').trim());
" 2>/dev/null) || true
          if [[ -z "$NOTES" ]]; then
            NOTES="Auto-published from release ${GITHUB_REF_NAME} (run ${GITHUB_RUN_ID}, commit ${GITHUB_SHA})."
            echo "::notice::No entry for v${VERSION} found in RELEASE_NOTES.md — using generic notes."
          else
            echo "::notice::Using release notes for v${VERSION} from RELEASE_NOTES.md."
          fi
          curl --fail-with-body --show-error --silent \
            -X PUT \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg url "/downloads/LabTrax.dmg" --arg ver "$VERSION" --arg notes "$NOTES" '{downloadUrl:$url, version:$ver, releaseNotes:$notes}')" \
            "$BASE_URL/api/admin/settings/desktop-installer"
          echo
          echo "::notice::Published LabTrax.dmg v$VERSION to $BASE_URL"

      - name: Upload macOS release assets
        # Upload DMGs (user download), zip archives (auto-updater payload),
        # blockmaps (integrity verification), and latest-mac.yml (version
        # manifest required by electron-updater for macOS auto-update).
        uses: actions/upload-artifact@v4
        with:
          name: LabTrax-macOS-Assets
          path: |
            artifacts/labtrax-desktop/electron-dist/*.dmg
            artifacts/labtrax-desktop/electron-dist/*.dmg.blockmap
            artifacts/labtrax-desktop/electron-dist/*.zip
            artifacts/labtrax-desktop/electron-dist/*.zip.blockmap
            artifacts/labtrax-desktop/electron-dist/latest-mac.yml
          if-no-files-found: error

  # ── Unified release ──────────────────────────────────────────────────────────
  # Runs only after both platform builds succeed. Downloads all release assets
  # from both platform build jobs and attaches them to a single GitHub Release.
  #
  # Auto-update manifest files (latest.yml, latest-mac.yml) are produced by
  # electron-builder locally during each platform build (GH_TOKEN is intentionally
  # omitted from those steps to prevent premature partial releases). The manifests
  # are captured via upload-artifact and attached here so that electron-updater
  # in existing installs can discover the new version on next launch.
  #
  # Required files for each platform's auto-updater:
  #   Windows  — latest.yml, *.exe, *.exe.blockmap
  #   macOS    — latest-mac.yml, *.zip, *.zip.blockmap (DMG is the user download,
  #              not the updater payload)
  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: LabTrax-Windows-Assets
          path: dist/windows

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: LabTrax-macOS-Assets
          path: dist/macos

      - name: Verify expected release files are present
        # Fail fast if any required asset is missing before touching the release.
        # Auto-update manifests (latest.yml, latest-mac.yml) and their matching
        # payloads (*.exe + blockmap for Windows; *.zip + blockmap for macOS) must
        # all be present — a missing manifest means existing installs can't detect
        # the new version; a missing payload or blockmap breaks the download/verify
        # step inside electron-updater.
        shell: bash
        run: |
          failed=false
          check_file() {
            if compgen -G "$1" > /dev/null; then
              echo "✓ Found: $1"
            else
              echo "::error::Missing expected release file: $1"
              failed=true
            fi
          }
          # Windows: installer, auto-update manifest, and blockmap
          check_file "dist/windows/*.exe"
          check_file "dist/windows/*.exe.blockmap"
          check_file "dist/windows/latest.yml"
          # macOS: DMG (user download), zip + blockmap (auto-updater payload), manifest
          check_file "dist/macos/*.dmg"
          check_file "dist/macos/*.zip"
          check_file "dist/macos/*.zip.blockmap"
          check_file "dist/macos/latest-mac.yml"
          if [[ "$failed" == "true" ]]; then exit 1; fi

      - name: Create unified GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: LabTrax ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## LabTrax ${{ github.ref_name }}

            > **This release is a draft.** All installers have been built and attached.
            > A team member should verify the attached files and edit these release notes
            > before publishing. To publish, run the **Publish Draft Release** workflow
            > from the Actions tab and enter `${{ github.ref_name }}` as the tag.

            ---

            Download the installer for your platform from the **Assets** section below.

            ---

            ### Windows

            1. Download the **LabTrax Setup \*.exe** file.
            2. Run the installer and follow the setup wizard (Next → Next → Finish).
            3. A desktop shortcut and Start Menu entry are created automatically.
            4. To uninstall, use **Add or Remove Programs** in Windows Settings.

            **Auto-update:** Existing installs are notified on next launch and can update with one click — no manual download needed.

            > The installer is code-signed, which reduces or eliminates Windows SmartScreen prompts.

            ---

            ### macOS

            1. Download the **LabTrax-\*.dmg** file matching your chip:
               - **Apple Silicon (M1/M2/M3):** download the `arm64` DMG
               - **Intel Mac:** download the `x64` DMG
               - If a universal build is provided it runs natively on both.
            2. Open the DMG and drag **LabTrax** into your **Applications** folder.
            3. Launch LabTrax from Applications or Spotlight.

            **Auto-update:** Existing installs check for updates on launch.

            > The app is signed with a Developer ID certificate and notarized by Apple — macOS will open it without any security warning.

            ---

            The app connects to your lab's LabTrax server. Make sure your server URL is reachable before launching.
          files: |
            dist/windows/*.exe
            dist/windows/*.exe.blockmap
            dist/windows/latest.yml
            dist/macos/*.dmg
            dist/macos/*.dmg.blockmap
            dist/macos/*.zip
            dist/macos/*.zip.blockmap
            dist/macos/latest-mac.yml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

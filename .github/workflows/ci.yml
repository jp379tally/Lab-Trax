name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  typecheck:
    name: Typecheck (all packages)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run typecheck

  test-api-server:
    name: API Server tests (+ storage integration)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Write the GCS service account key to a temp file so that the Google
      # Cloud Storage client can authenticate via Application Default
      # Credentials (ADC).  The key is stored as a repository secret named
      # CI_GOOGLE_CREDENTIALS_JSON and contains the full JSON of a service
      # account that has objectAdmin rights on the staging installer bucket.
      #
      # To provision the staging bucket and populate all four secrets, run:
      #   bash .github/scripts/setup-gcs-staging-bucket.sh --project YOUR_GCP_PROJECT_ID
      # The script creates the bucket, service account (with objectAdmin rights
      # on the bucket only — not project-wide), and a key file, then prints the
      # exact values to paste into repository Settings → Secrets and variables.
      # If the GitHub CLI (gh) is available it can set the secrets automatically.
      #
      # If a CI runner is killed mid-test (OOM, timeout, network outage), dummy
      # objects can be stranded in the staging bucket.  To remove them, run:
      #   bash .github/scripts/cleanup-ci-staging-bucket.sh --project YOUR_GCP_PROJECT_ID
      # The script lists and deletes all objects under the CI prefix and is safe
      # to run repeatedly (prints "Nothing to clean up" when the prefix is empty).
      #
      # If the secret is absent the write step is skipped, GOOGLE_APPLICATION_
      # CREDENTIALS stays unset, and the storage integration test auto-skips
      # via its own guard (SUITE_ENABLED check in installer-storage-e2e.test.ts).
      - name: Write GCS credentials file
        if: ${{ secrets.CI_GOOGLE_CREDENTIALS_JSON != '' }}
        run: |
          echo '${{ secrets.CI_GOOGLE_CREDENTIALS_JSON }}' > /tmp/gcs-ci-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-ci-key.json" >> "$GITHUB_ENV"
        env:
          CI_GOOGLE_CREDENTIALS_JSON: ${{ secrets.CI_GOOGLE_CREDENTIALS_JSON }}

      # Best-effort check: warn if the GCS key looks older than the expected
      # 31-day rotation window.  The key JSON has no embedded timestamp, so
      # this step uses a heuristic: the first 8 hex chars of a GCP key ID
      # encode the creation epoch for keys issued after ~2016.  This is NOT
      # a documented API contract — it may mis-fire on future GCP key formats.
      # The step only emits ::warning:: annotations and never blocks CI.
      # Authoritative age information is available in the "Rotate CI GCS Key"
      # workflow, which queries the IAM API directly.
      - name: Best-effort GCS key age check (heuristic, non-blocking)
        if: ${{ secrets.CI_GOOGLE_CREDENTIALS_JSON != '' }}
        shell: bash
        env:
          CI_GOOGLE_CREDENTIALS_JSON: ${{ secrets.CI_GOOGLE_CREDENTIALS_JSON }}
        run: |
          KEY_ID=$(echo "$CI_GOOGLE_CREDENTIALS_JSON" | jq -r '.private_key_id // empty')
          if [[ -z "$KEY_ID" ]]; then
            echo "Could not parse private_key_id from CI_GOOGLE_CREDENTIALS_JSON — skipping age check."
            exit 0
          fi

          # Heuristic: GCP key IDs created after ~2016 encode the creation
          # epoch as a big-endian hex value in the first 8 characters.
          # This is not a stable contract — treat results as approximate only.
          HEX_PREFIX="${KEY_ID:0:8}"
          if [[ ! "$HEX_PREFIX" =~ ^[0-9a-fA-F]{8}$ ]]; then
            echo "Key ID format not recognised — skipping age heuristic."
            exit 0
          fi

          CREATED_TS=$(( 16#$HEX_PREFIX ))
          NOW_TS=$(date +%s)
          AGE_DAYS=$(( (NOW_TS - CREATED_TS) / 86400 ))

          # Sanity-gate: reject implausible values (future dates or > 10 yrs)
          # that indicate the heuristic does not apply to this key format.
          if [[ $AGE_DAYS -lt 0 || $AGE_DAYS -ge 3650 ]]; then
            echo "Key age heuristic produced an implausible value ($AGE_DAYS days) — skipping warning. This is expected if GCP changes their key ID format."
            exit 0
          fi

          echo "Estimated CI GCS key age: ~$AGE_DAYS day(s) (heuristic — may not be exact)"
          if [[ $AGE_DAYS -ge 60 ]]; then
            echo "::warning::CI GCS key $KEY_ID appears to be ~$AGE_DAYS days old (heuristic estimate) — well past the expected 31-day rotation cadence. If storage tests start failing with auth errors, trigger the 'Rotate CI GCS Key' workflow manually and verify it runs successfully each month."
          elif [[ $AGE_DAYS -ge 40 ]]; then
            echo "::warning::CI GCS key $KEY_ID appears to be ~$AGE_DAYS days old (heuristic estimate) — the monthly rotation workflow may have missed a run. Verify that 'rotate-ci-key.yml' ran successfully last month."
          else
            echo "Estimated key age is within the expected rotation window."
          fi

      # Guard against partial misconfiguration: the storage integration test
      # requires four secrets to be set together.  If any are present but the
      # full set is incomplete, the test would silently skip instead of running
      # — which defeats the purpose of wiring it into CI.  Fail early with an
      # actionable message so misconfiguration is caught before the test step.
      #
      # All four absent → green (test auto-skips; expected for repos that
      #   haven't provisioned a staging bucket yet).
      # All four present → green (test runs against the staging bucket).
      # Partial set → fail with the list of missing secrets.
      - name: Check storage test secret consistency
        shell: bash
        env:
          PRIVATE_OBJECT_DIR: ${{ secrets.CI_PRIVATE_OBJECT_DIR }}
          DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${{ secrets.CI_DEFAULT_OBJECT_STORAGE_BUCKET_ID }}
          PLATFORM_ADMIN_SECRET: ${{ secrets.CI_PLATFORM_ADMIN_SECRET }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.CI_GOOGLE_CREDENTIALS_JSON }}
        run: |
          set_secrets=()
          missing_secrets=()

          [[ -n "$PRIVATE_OBJECT_DIR"              ]] && set_secrets+=("CI_PRIVATE_OBJECT_DIR")              || missing_secrets+=("CI_PRIVATE_OBJECT_DIR")
          [[ -n "$DEFAULT_OBJECT_STORAGE_BUCKET_ID" ]] && set_secrets+=("CI_DEFAULT_OBJECT_STORAGE_BUCKET_ID") || missing_secrets+=("CI_DEFAULT_OBJECT_STORAGE_BUCKET_ID")
          [[ -n "$PLATFORM_ADMIN_SECRET"           ]] && set_secrets+=("CI_PLATFORM_ADMIN_SECRET")           || missing_secrets+=("CI_PLATFORM_ADMIN_SECRET")
          [[ -n "$GOOGLE_CREDENTIALS_JSON"         ]] && set_secrets+=("CI_GOOGLE_CREDENTIALS_JSON")         || missing_secrets+=("CI_GOOGLE_CREDENTIALS_JSON")

          if [[ ${#set_secrets[@]} -eq 0 ]]; then
            echo "::notice::No storage credentials configured — the installer storage integration test will be skipped."
            echo "::notice::To enable it, set all four secrets in repository Settings → Secrets and variables → Actions:"
            echo "::notice::  CI_PRIVATE_OBJECT_DIR, CI_DEFAULT_OBJECT_STORAGE_BUCKET_ID, CI_GOOGLE_CREDENTIALS_JSON, CI_PLATFORM_ADMIN_SECRET"
          elif [[ ${#missing_secrets[@]} -eq 0 ]]; then
            echo "::notice::All storage integration test credentials are configured — the test will run against the staging bucket."
          else
            echo "::error::Partial storage secret configuration detected."
            echo "::error::These secrets are set:   ${set_secrets[*]}"
            echo "::error::These secrets are missing: ${missing_secrets[*]}"
            echo "::error::The installer storage integration test will be silently skipped instead of running."
            echo "::error::Either set all four secrets together or remove the partial set to acknowledge that the storage test is disabled."
            exit 1
          fi

      - name: Run API server tests
        # PRIVATE_OBJECT_DIR and DEFAULT_OBJECT_STORAGE_BUCKET_ID point to a
        # dedicated CI/staging bucket — NOT the production bucket — so the
        # dummy EXE written by the storage round-trip test never touches live
        # installer downloads.  The afterAll in installer-storage-e2e.test.ts
        # deletes the dummy EXE after each run so the bucket stays clean.
        #
        # CI_PLATFORM_ADMIN_SECRET is a repository secret scoped to the
        # staging environment so the production PLATFORM_ADMIN_SECRET is
        # never stored in CI.
        #
        # The installer-storage-e2e suite auto-skips when either
        # PRIVATE_OBJECT_DIR or PLATFORM_ADMIN_SECRET is unset (and the
        # consistency check above already fails on partial configurations).
        run: pnpm --filter @workspace/api-server run test
        env:
          NODE_ENV: test
          PRIVATE_OBJECT_DIR: ${{ secrets.CI_PRIVATE_OBJECT_DIR }}
          DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${{ secrets.CI_DEFAULT_OBJECT_STORAGE_BUCKET_ID }}
          PLATFORM_ADMIN_SECRET: ${{ secrets.CI_PLATFORM_ADMIN_SECRET }}

      # If the test job fails (e.g. the runner was killed mid-test), any dummy
      # objects written by installer-storage-e2e.test.ts may be stranded in the
      # staging bucket because afterAll never ran.  This step cleans them up
      # automatically so objects don't accumulate across failed runs.
      #
      # The step is skipped gracefully when the GCS credentials are absent:
      # GOOGLE_APPLICATION_CREDENTIALS is only written to $GITHUB_ENV by the
      # "Write GCS credentials file" step above when CI_GOOGLE_CREDENTIALS_JSON
      # is set, so an empty variable here means no storage secrets are configured
      # and there is nothing to clean up.
      #
      # The GCP project ID is extracted from the credentials JSON (project_id
      # field) so no additional secret is required.
      - name: Clean up CI staging bucket (on failure)
        if: failure()
        shell: bash
        run: |
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]]; then
            echo "::notice::Skipping bucket cleanup — GCS credentials not configured."
            exit 0
          fi
          PROJECT=$(jq -r '.project_id' "$GOOGLE_APPLICATION_CREDENTIALS")
          if [[ -z "$PROJECT" || "$PROJECT" == "null" ]]; then
            echo "::warning::Could not extract project_id from GCS credentials — skipping bucket cleanup."
            exit 0
          fi
          bash .github/scripts/cleanup-ci-staging-bucket.sh --project "$PROJECT"

  test-labtrax-desktop:
    name: Desktop client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs the vitest suite for the Electron desktop client. Covers:
      #   * pure helpers extracted from the iTero Lab-Review poller
      #     (electron/itero-helpers.cjs) — interval clamping, login-page
      #     sniffing, status-token normalisation, Lab-Review status detection.
      #   * encrypted credential round-trip in electron/auth-store.cjs (with
      #     safeStorage and userData mocked).
      #   * auto-updater event wiring in electron/main.cjs — releaseNotes
      #     normalisation across string/array/object shapes, download-progress
      #     forwarding, install-update / get-app-version IPC handlers.
      #   * IPC startup smoke test — main.cjs loads without throwing and
      #     registers every expected IPC channel exactly once.
      # Add new tests under artifacts/labtrax-desktop/electron/__tests__/.
      - name: Run desktop client tests
        run: pnpm --filter @workspace/labtrax-desktop run test

  smoke-labtrax-desktop:
    name: Desktop client real-Electron smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Electron on Linux needs a Chromium-style set of system libraries
      # plus xvfb so the main process can create a BrowserWindow under a
      # virtual display. We use playwright-core (much smaller than the full
      # `playwright` package) for the Electron driver, which means we have
      # to install the system libs by hand instead of via
      # `playwright install-deps`. The list below is the apt set Playwright
      # itself installs for Chromium on Ubuntu — keep it in sync if a future
      # Electron upgrade pulls in newer Chromium runtime requirements.
      - name: Install Electron system dependencies + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libnspr4 \
            libdrm2 \
            libxshmfence1 \
            libglib2.0-0t64

      # Build the renderer the same way `electron:build` does, but skip the
      # full electron-builder packaging step (NSIS / DMG generation is
      # platform-specific and unrelated to runtime breakage). Loading
      # `dist/electron-app/index.html` via the production `app://labtrax/`
      # protocol handler is what actually exercises the runtime.
      - name: Build renderer
        env:
          # Smoke-test uses no real backend — placeholder is fine.
          VITE_API_BASE_URL: https://example.invalid
        run: pnpm --filter @workspace/labtrax-desktop exec vite build --config vite.electron.config.ts

      # Boots a real Electron binary under xvfb and asserts:
      #   * main process loads without throwing
      #   * a renderer window is created and finishes loading
      #   * renderer URL is app://labtrax/… (custom protocol handler works)
      #   * preload bridge `window.electronAPI` exposes every expected key
      #     under contextIsolation
      #   * no uncaught exceptions in the renderer or fatal errors on
      #     main-process stderr
      # Failure here blocks merge so a broken Electron build never reaches
      # the auto-updater feed.
      - name: Run real-Electron smoke test
        run: xvfb-run -a pnpm --filter @workspace/labtrax-desktop run electron:smoke

  test-labtrax-mobile:
    name: Mobile client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs the vitest suite for the Expo mobile client. Currently exercises
      # the pure helpers under artifacts/labtrax/lib/ (scan-helpers,
      # case-reconciliation). Add new tests under
      # artifacts/labtrax/lib/__tests__/ as more pure logic is extracted from
      # screens/components.
      - name: Run mobile client tests
        run: pnpm --filter @workspace/labtrax run test

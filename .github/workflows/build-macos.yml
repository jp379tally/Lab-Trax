name: Build macOS Installer (Test)

# Standalone build for local testing and CI smoke checks.
# For official versioned releases, use the Release workflow (.github/workflows/release.yml),
# which runs both platform builds in parallel and publishes a single unified GitHub Release.

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Production API base URL (e.g. https://your-app.replit.app)"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Certificate & notarization secrets check ─────────────────────────────
      # All Apple secrets are optional for manual test runs — omitting them
      # produces an ad-hoc-signed DMG suitable for local testing only.
      # Gatekeeper will block the unsigned build on other machines.
      - name: Warn when signing secrets are absent
        shell: bash
        run: |
          missing=()
          [[ -z "$CSC_LINK" ]]                    && missing+=("MACOS_CERTIFICATE")
          [[ -z "$CSC_KEY_PASSWORD" ]]            && missing+=("MACOS_CERTIFICATE_PASSWORD")
          [[ -z "$APPLE_ID" ]]                    && missing+=("APPLE_ID")
          [[ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -z "$APPLE_TEAM_ID" ]]               && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Signing/notarization secrets are missing: ${missing[*]}"
            echo "::warning::Producing an unsigned ad-hoc build — suitable for local testing only."
          fi
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Build ─────────────────────────────────────────────────────────────────
      # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD to load the signing
      # certificate into a temporary keychain automatically. When those vars are
      # absent (unsigned workflow_dispatch runs) it produces an ad-hoc-signed
      # build — usable for testing but blocked by Gatekeeper on other machines.
      #
      # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID drive
      # notarization. electron-builder submits the signed app to Apple's
      # notarization service and staples the resulting ticket into the DMG so
      # Gatekeeper passes without any warning on end-user machines.
      #
      # No GH_TOKEN is passed so no GitHub Release is created by this workflow.
      - name: Build macOS DMG
        run: pnpm --filter @workspace/labtrax-desktop run electron:build
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url }}
          ELECTRON_PLATFORM: mac
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabTrax-macOS-DMG
          path: artifacts/labtrax-desktop/electron-dist/*.dmg
          if-no-files-found: error

name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Production API base URL (e.g. https://your-app.replit.app)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require signing secrets for release builds
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" ]]; then
            echo "::error::WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets must be set for tagged release builds. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build and package Windows installer
        run: pnpm --filter @workspace/labtrax-desktop run electron:build
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.VITE_API_BASE_URL }}
          # electron-builder picks up CSC_LINK / CSC_KEY_PASSWORD automatically.
          # Omitting these secrets produces an unsigned build (allowed for
          # workflow_dispatch; blocked for tag pushes by the step above).
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Verify installer signature
        if: env.CSC_LINK != ''
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $installers = Get-ChildItem -Path "artifacts/labtrax-desktop/electron-dist" -Filter "*.exe" -ErrorAction Stop
          if ($installers.Count -eq 0) {
            Write-Host "::error::No .exe installer found in artifacts/labtrax-desktop/electron-dist."
            exit 1
          }
          $failed = $false
          foreach ($installer in $installers) {
            Write-Host "Verifying signature: $($installer.Name)"
            signtool verify /pa /v "$($installer.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Signature verification FAILED for $($installer.Name). The certificate may be misconfigured or expired, or electron-builder did not sign the output. Check that WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD are valid and that the CSC_LINK env var was passed to the build step."
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All installers passed signature verification."

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabTrax-Windows-Installer
          path: artifacts/labtrax-desktop/electron-dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release and upload installer
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: LabTrax ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## LabTrax ${{ github.ref_name }} — Windows Installer

            ### Installation
            1. Download the **LabTrax Setup \*.exe** file below.
            2. Run the installer and follow the setup wizard (Next → Next → Finish).
            3. A desktop shortcut and Start Menu entry are created automatically.
            4. To remove, use **Add or Remove Programs** in Windows Settings.

            ### Notes
            - The installer is code-signed, which reduces or eliminates Windows SmartScreen prompts.
            - The installer connects to your lab's LabTrax server. Make sure your server URL is reachable.
          files: artifacts/labtrax-desktop/electron-dist/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

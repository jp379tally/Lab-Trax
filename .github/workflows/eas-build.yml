name: EAS Mobile Build

# Canonical workflow for triggering a production EAS build.
#
# This workflow owns the mobile build-number bump: it increments
# ios.buildNumber / android.versionCode in artifacts/labtrax/app.json,
# commits the result back to main, and THEN kicks off the EAS build.
# Because the bump is committed before EAS starts, every run produces a
# unique, persisted counter — re-running on the same commit yields the
# next sequential number, not the same one.
#
# The prebuildCommand in eas.json is removed from the production profile
# so that bumping only happens here (one source of truth). It is kept in
# development/preview profiles for local eas build convenience.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN  — Expo access token with publish rights for the project

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  bump-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so git push doesn't fail on shallow clones.
          fetch-depth: 0
          # BUILD_BOT_TOKEN should be a fine-grained PAT (or GitHub App token)
          # with "bypass branch protection" rights so the build-number commit-back
          # push succeeds even when main requires a PR or status checks.
          # Falls back to the default GITHUB_TOKEN on repos with no branch
          # protection — callers that have not set the secret get the old behaviour.
          token: ${{ secrets.BUILD_BOT_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Increment ios.buildNumber / android.versionCode in app.json and commit
      # the result before the EAS build starts. This ensures the counter is
      # persisted even if the EAS build is later cancelled or retried.
      - name: Bump mobile build number
        run: pnpm --filter @workspace/scripts run bump-build-number

      - name: Commit bumped app.json
        id: commit-build-number
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/labtrax/app.json
          if git diff --cached --quiet; then
            echo "app.json unchanged — nothing to commit."
            exit 0
          fi
          BUILD_NUM=$(node -p \
            "JSON.parse(require('fs').readFileSync('artifacts/labtrax/app.json','utf8')).expo.ios.buildNumber")
          git commit -m "chore: bump mobile build number to ${BUILD_NUM} [skip ci]"
          # Retry with rebase in case another job pushed to main concurrently.
          pushed=false
          for attempt in 1 2 3; do
            if git pull --rebase origin main \
                && git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — retrying in ${attempt}s…"
            sleep "$attempt"
          done
          if [[ "$pushed" != "true" ]]; then
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::All push attempts failed — mobile build number was NOT persisted. The EAS build will still proceed; download the build-counter-fallback workflow artifact and apply it manually (see docs/build-counter-recovery.md)."
          fi

      - name: Upload build counter fallback artifact
        if: always() && steps.commit-build-number.outputs.push_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-counter-fallback
          path: artifacts/labtrax/app.json

      # Alert admins when the build-number commit fails to push so the silent
      # counter-reset bug is caught immediately rather than discovered later.
      # Uses the same opt-in gating as the desktop workflows: both secrets
      # must be set, otherwise the step skips without error.
      - name: Notify admins on build-number push failure
        if: always() && steps.commit-build-number.outputs.push_failed == 'true'
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping build-number push failure alert — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg workflowName "${GITHUB_WORKFLOW}" \
            --arg runUrl "$RUN_URL" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commitSha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg stage "build-number-commit" \
            --arg errorMessage "All 3 push attempts to persist app.json (mobile build number) to main failed. The iOS/Android build number counter may reset on the next checkout — check branch protection rules or network connectivity." \
            '{workflowName:$workflowName, runUrl:$runUrl, runId:$runId, commitSha:$commitSha, ref:$ref, stage:$stage, errorMessage:$errorMessage}')
          echo "Reporting mobile build-number push failure to $BASE_URL/api/admin/desktop-installer/publish-failure"
          NOTIFY_BODY=$(mktemp)
          NOTIFY_STATUS=$(curl --silent --show-error --output "$NOTIFY_BODY" --write-out '%{http_code}' \
            -X POST \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$BASE_URL/api/admin/desktop-installer/publish-failure") || true
          NOTIFY_STATUS="${NOTIFY_STATUS:-000}"
          cat "$NOTIFY_BODY"; echo
          if [[ ! "$NOTIFY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 500 "$NOTIFY_BODY")
            echo "::warning::Failed to deliver build-number push failure alert (HTTP $NOTIFY_STATUS): $BODY_TRUNC — admins will not receive an email for this run."
          fi

      - name: Build on EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        id: trigger-eas-build
        working-directory: artifacts/labtrax
        run: |
          eas build \
            --platform "${{ github.event.inputs.platform }}" \
            --profile  "${{ github.event.inputs.profile }}" \
            --non-interactive \
            --no-wait

      # Alert admins when the EAS build trigger itself fails (bad Expo token,
      # quota exceeded, compile error, etc.) so the failure surfaces in-app
      # rather than relying solely on GitHub's default email notification.
      # Uses the same opt-in gating as the other notify steps: both secrets
      # must be set, otherwise the step skips without error.
      - name: Notify admins on EAS build failure
        if: always() && steps.trigger-eas-build.outcome == 'failure'
        shell: bash
        env:
          PLATFORM_ADMIN_SECRET: ${{ secrets.PLATFORM_ADMIN_SECRET }}
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
        run: |
          if [[ -z "$PLATFORM_ADMIN_SECRET" || -z "$PUBLISH_API_BASE_URL" ]]; then
            echo "::notice::Skipping EAS build failure alert — PLATFORM_ADMIN_SECRET or PUBLISH_API_BASE_URL not set."
            exit 0
          fi
          BASE_URL="${PUBLISH_API_BASE_URL%/}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg workflowName "${GITHUB_WORKFLOW}" \
            --arg runUrl "$RUN_URL" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commitSha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg stage "eas-build-trigger" \
            --arg errorMessage "The EAS build job failed (platform: ${{ github.event.inputs.platform }}, profile: ${{ github.event.inputs.profile }}). Possible causes: invalid EXPO_TOKEN, build quota exceeded, or a compile error. Check the run log for details." \
            '{workflowName:$workflowName, runUrl:$runUrl, runId:$runId, commitSha:$commitSha, ref:$ref, stage:$stage, errorMessage:$errorMessage}')
          echo "Reporting EAS build failure to $BASE_URL/api/admin/desktop-installer/publish-failure"
          NOTIFY_BODY=$(mktemp)
          NOTIFY_STATUS=$(curl --silent --show-error --output "$NOTIFY_BODY" --write-out '%{http_code}' \
            -X POST \
            -H "X-Platform-Admin-Secret: $PLATFORM_ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$BASE_URL/api/admin/desktop-installer/publish-failure") || true
          NOTIFY_STATUS="${NOTIFY_STATUS:-000}"
          cat "$NOTIFY_BODY"; echo
          if [[ ! "$NOTIFY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            BODY_TRUNC=$(head -c 500 "$NOTIFY_BODY")
            echo "::warning::Failed to deliver EAS build failure alert (HTTP $NOTIFY_STATUS): $BODY_TRUNC — admins will not receive an email for this run."
          fi

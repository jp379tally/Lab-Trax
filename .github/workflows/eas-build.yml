name: EAS Mobile Build

# Canonical workflow for triggering a production EAS build.
#
# This workflow owns the mobile build-number bump: it increments
# ios.buildNumber / android.versionCode in artifacts/labtrax/app.json,
# commits the result back to main, and THEN kicks off the EAS build.
# Because the bump is committed before EAS starts, every run produces a
# unique, persisted counter — re-running on the same commit yields the
# next sequential number, not the same one.
#
# The prebuildCommand in eas.json is removed from the production profile
# so that bumping only happens here (one source of truth). It is kept in
# development/preview profiles for local eas build convenience.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN  — Expo access token with publish rights for the project

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  bump-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so git push doesn't fail on shallow clones.
          fetch-depth: 0
          # BUILD_BOT_TOKEN should be a fine-grained PAT (or GitHub App token)
          # with "bypass branch protection" rights so the build-number commit-back
          # push succeeds even when main requires a PR or status checks.
          # Falls back to the default GITHUB_TOKEN on repos with no branch
          # protection — callers that have not set the secret get the old behaviour.
          token: ${{ secrets.BUILD_BOT_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Increment ios.buildNumber / android.versionCode in app.json and commit
      # the result before the EAS build starts. This ensures the counter is
      # persisted even if the EAS build is later cancelled or retried.
      - name: Bump mobile build number
        run: pnpm --filter @workspace/scripts run bump-build-number

      - name: Commit bumped app.json
        id: commit-build-number
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/labtrax/app.json
          if git diff --cached --quiet; then
            echo "app.json unchanged — nothing to commit."
            exit 0
          fi
          BUILD_NUM=$(node -p \
            "JSON.parse(require('fs').readFileSync('artifacts/labtrax/app.json','utf8')).expo.ios.buildNumber")
          git commit -m "chore: bump mobile build number to ${BUILD_NUM} [skip ci]"
          # Retry with rebase in case another job pushed to main concurrently.
          pushed=false
          for attempt in 1 2 3; do
            if git pull --rebase origin main \
                && git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — retrying in ${attempt}s…"
            sleep "$attempt"
          done
          if [[ "$pushed" != "true" ]]; then
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::All push attempts failed — mobile build number was NOT persisted. The EAS build will still proceed; download the build-counter-fallback workflow artifact and apply it manually (see docs/build-counter-recovery.md)."
          fi

      - name: Upload build counter fallback artifact
        if: always() && steps.commit-build-number.outputs.push_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-counter-fallback
          path: artifacts/labtrax/app.json

      - name: Build on EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        working-directory: artifacts/labtrax
        run: |
          eas build \
            --platform "${{ github.event.inputs.platform }}" \
            --profile  "${{ github.event.inputs.profile }}" \
            --non-interactive \
            --no-wait

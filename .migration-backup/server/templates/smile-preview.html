<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Smile Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }
    #container {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      z-index: 10;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .control-row:last-child { margin-bottom: 0; }
    .control-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      min-width: 70px;
    }
    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .control-value {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      min-width: 32px;
      text-align: right;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 22px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-capture {
      background: #2563EB;
      color: #fff;
    }
    .btn-toggle {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .btn-toggle.active {
      background: #10B981;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
    }
    #error-msg {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      padding: 40px;
      text-align: center;
      gap: 12px;
    }
    #error-msg h2 { font-size: 18px; }
    #error-msg p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    #capture-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.1s;
    }
    .shade-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .shade-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .shade-btn.active {
      border-color: #fff;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="capture-flash"></div>

    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Initializing camera...</div>
    </div>

    <div id="error-msg">
      <h2>Camera Required</h2>
      <p>Please allow camera access to use the Smile Preview feature. This works best with a front-facing camera pointed at the patient's face.</p>
    </div>

    <div id="controls">
      <div class="control-row">
        <span class="control-label">Brightness</span>
        <input type="range" id="brightness" min="0" max="100" value="50">
        <span class="control-value" id="brightness-val">50%</span>
      </div>
      <div class="control-row">
        <span class="control-label">Shade</span>
        <div class="shade-row" id="shade-row"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-toggle active" id="toggle-btn" onclick="toggleEffect()">
          ✨ Whitening ON
        </button>
        <button class="btn btn-capture" id="capture-btn" onclick="capturePhoto()">
          📸 Capture
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const loadingEl = document.getElementById("loading");
    const loadingText = document.getElementById("loading-text");
    const errorMsg = document.getElementById("error-msg");
    const brightnessSlider = document.getElementById("brightness");
    const brightnessVal = document.getElementById("brightness-val");
    const captureFlash = document.getElementById("capture-flash");
    const toggleBtn = document.getElementById("toggle-btn");

    let effectOn = true;
    let whitenIntensity = 0.5;
    let selectedShade = "#F5F5F0";

    const SHADES = [
      { name: "A1", color: "#F5F0E6" },
      { name: "A2", color: "#EDE8D5" },
      { name: "BL1", color: "#F5F5F0" },
      { name: "BL2", color: "#F0F0EA" },
      { name: "BL3", color: "#EAEAE4" },
      { name: "B1", color: "#EEE8D8" },
      { name: "Hollywood", color: "#FFFFFF" },
    ];

    const shadeRow = document.getElementById("shade-row");
    SHADES.forEach((s, i) => {
      const btn = document.createElement("div");
      btn.className = "shade-btn" + (s.color === selectedShade ? " active" : "");
      btn.style.background = s.color;
      btn.title = s.name;
      btn.onclick = () => {
        selectedShade = s.color;
        document.querySelectorAll(".shade-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
      shadeRow.appendChild(btn);
    });

    brightnessSlider.addEventListener("input", (e) => {
      whitenIntensity = parseInt(e.target.value) / 100;
      brightnessVal.textContent = e.target.value + "%";
    });

    function toggleEffect() {
      effectOn = !effectOn;
      toggleBtn.textContent = effectOn ? "✨ Whitening ON" : "Whitening OFF";
      toggleBtn.classList.toggle("active", effectOn);
    }

    const UPPER_LIP_OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
    const LOWER_LIP_OUTER = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291];
    const UPPER_LIP_INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308];
    const LOWER_LIP_INNER = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308];

    let faceMesh = null;
    let currentLandmarks = null;

    async function init() {
      try {
        loadingText.textContent = "Loading face detection model...";
        faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`
        });

        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });

        faceMesh.onResults(onResults);
        await faceMesh.initialize();

        loadingText.textContent = "Starting camera...";
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        loadingEl.style.display = "none";
        requestAnimationFrame(processFrame);
      } catch (err) {
        console.error("Init error:", err);
        loadingEl.style.display = "none";
        errorMsg.style.display = "flex";
      }
    }

    async function processFrame() {
      if (video.readyState >= 2) {
        await faceMesh.send({ image: video });
      }
      requestAnimationFrame(processFrame);
    }

    let lastCanvasW = 0, lastCanvasH = 0;
    function onResults(results) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (vw !== lastCanvasW || vh !== lastCanvasH) {
        canvas.width = vw;
        canvas.height = vh;
        lastCanvasW = vw;
        lastCanvasH = vh;
      }
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, w, h);
      ctx.restore();

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0 && effectOn) {
        const landmarks = results.multiFaceLandmarks[0];
        currentLandmarks = landmarks;
        drawTeethWhitening(landmarks, w, h);
      }
    }

    function drawTeethWhitening(landmarks, w, h) {
      const upperInner = UPPER_LIP_INNER.map(i => ({
        x: (1 - landmarks[i].x) * w,
        y: landmarks[i].y * h,
      }));
      const lowerInner = LOWER_LIP_INNER.map(i => ({
        x: (1 - landmarks[i].x) * w,
        y: landmarks[i].y * h,
      }));

      const mouthOpen = Math.abs(upperInner[5].y - lowerInner[5].y);
      if (mouthOpen < 3) return;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(upperInner[0].x, upperInner[0].y);
      for (let i = 1; i < upperInner.length; i++) {
        ctx.lineTo(upperInner[i].x, upperInner[i].y);
      }
      for (let i = lowerInner.length - 1; i >= 0; i--) {
        ctx.lineTo(lowerInner[i].x, lowerInner[i].y);
      }
      ctx.closePath();
      ctx.clip();

      const midX = (upperInner[5].x + lowerInner[5].x) / 2;
      const midY = (upperInner[5].y + lowerInner[5].y) / 2;
      const mouthWidth = Math.abs(upperInner[0].x - upperInner[upperInner.length - 1].x);

      const r = parseInt(selectedShade.slice(1, 3), 16);
      const g = parseInt(selectedShade.slice(3, 5), 16);
      const b = parseInt(selectedShade.slice(5, 7), 16);

      const grad = ctx.createRadialGradient(midX, midY, 0, midX, midY, mouthWidth * 0.6);
      grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${whitenIntensity * 0.75})`);
      grad.addColorStop(0.7, `rgba(${r}, ${g}, ${b}, ${whitenIntensity * 0.55})`);
      grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, ${whitenIntensity * 0.2})`);

      ctx.globalCompositeOperation = "lighten";
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.globalCompositeOperation = "overlay";
      const grad2 = ctx.createRadialGradient(midX, midY, 0, midX, midY, mouthWidth * 0.5);
      grad2.addColorStop(0, `rgba(255, 255, 255, ${whitenIntensity * 0.3})`);
      grad2.addColorStop(1, `rgba(255, 255, 255, 0)`);
      ctx.fillStyle = grad2;
      ctx.fill();

      ctx.restore();
    }

    function capturePhoto() {
      captureFlash.style.opacity = "1";
      setTimeout(() => { captureFlash.style.opacity = "0"; }, 150);

      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext("2d");
      tempCtx.drawImage(canvas, 0, 0);

      tempCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `smile-preview-${Date.now()}.jpg`;
        a.click();
        URL.revokeObjectURL(url);

        if (window.ReactNativeWebView) {
          const reader = new FileReader();
          reader.onloadend = () => {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: "capture",
              dataUrl: reader.result,
            }));
          };
          reader.readAsDataURL(blob);
        }
      }, "image/jpeg", 0.92);
    }

    init();
  </script>
</body>
</html>

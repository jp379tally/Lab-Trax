<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - LabTrax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0F172A; color: #FFF; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1E293B; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { font-size: 28px; color: #4A6CF7; font-weight: 700; }
    .logo p { color: #94A3B8; font-size: 14px; margin-top: 4px; }
    h2 { font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: #94A3B8; font-size: 14px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #94A3B8; margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 16px; background: #0F172A; border: 1px solid #334155; border-radius: 10px; color: #FFF; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #4A6CF7; }
    .btn { width: 100%; padding: 14px; background: #4A6CF7; color: #FFF; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86EFAC; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
    .requirements { color: #94A3B8; font-size: 12px; margin-top: 4px; }
    .requirements span { display: block; margin-top: 2px; }
    .requirements .met { color: #22C55E; }
    .requirements .unmet { color: #94A3B8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>LabTrax</h1>
      <p>Allied Dental Lab</p>
    </div>
    <div id="form-view">
      <h2>Reset Your Password</h2>
      <p class="subtitle">Enter your new password below.</p>
      <div id="error-msg" class="error" style="display:none;"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password" />
        <div class="requirements" id="reqs">
          <span id="req-len" class="unmet">&#x2022; At least 8 characters</span>
          <span id="req-upper" class="unmet">&#x2022; One uppercase letter</span>
          <span id="req-lower" class="unmet">&#x2022; One lowercase letter</span>
          <span id="req-special" class="unmet">&#x2022; One special character</span>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" />
      </div>
      <button class="btn" id="submit-btn" onclick="handleReset()">Reset Password</button>
    </div>
    <div id="success-view" style="display:none;">
      <div class="success">Your password has been reset successfully!</div>
      <p style="text-align:center; color:#94A3B8; font-size:14px; margin-top:16px;">You can now sign in with your new password in the LabTrax app.</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const pwInput = document.getElementById("new-password");
    const confirmInput = document.getElementById("confirm-password");

    if (!token) {
      document.getElementById("form-view").innerHTML = '<div class="error">Invalid reset link. Please request a new password reset from the app.</div>';
    }

    pwInput.addEventListener("input", function() {
      const pw = this.value;
      document.getElementById("req-len").className = pw.length >= 8 ? "met" : "unmet";
      document.getElementById("req-upper").className = /[A-Z]/.test(pw) ? "met" : "unmet";
      document.getElementById("req-lower").className = /[a-z]/.test(pw) ? "met" : "unmet";
      document.getElementById("req-special").className = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(pw) ? "met" : "unmet";
    });

    async function handleReset() {
      const pw = pwInput.value;
      const confirm = confirmInput.value;
      const errEl = document.getElementById("error-msg");
      errEl.style.display = "none";

      if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[a-z]/.test(pw) || !/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(pw)) {
        errEl.textContent = "Password does not meet the requirements.";
        errEl.style.display = "block";
        return;
      }
      if (pw !== confirm) {
        errEl.textContent = "Passwords do not match.";
        errEl.style.display = "block";
        return;
      }

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Resetting...";

      try {
        const resp = await fetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword: pw }),
        });
        const data = await resp.json();
        if (data.success) {
          document.getElementById("form-view").style.display = "none";
          document.getElementById("success-view").style.display = "block";
        } else {
          errEl.textContent = data.error || "Failed to reset password.";
          errEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Reset Password";
        }
      } catch (e) {
        errEl.textContent = "Connection error. Please try again.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Reset Password";
      }
    }
  </script>
</body>
</html>

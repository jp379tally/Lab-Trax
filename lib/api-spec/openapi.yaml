openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Case operations (LabTrax)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /cases/import-from-itero-rx:
    post:
      operationId: importCaseFromIteroRx
      tags: [cases]
      summary: Import a case from an iTero Lab-Review Rx
      description: |
        Auto-create a LabTrax case from an iTero Lab-Review prescription. The
        Rx file (PDF or image) is uploaded as multipart/form-data with the
        field name `file`. The server uses OpenAI to extract patient, doctor,
        restoration, and notes fields from the Rx, creates an Active case
        with the Rx attached and `needsAiReview=true`, and records the iTero
        order id in `itero_imported_orders` so re-polls are idempotent.
      requestBody:
        required: true
        description: |
          multipart/form-data with the Rx PDF or image attached as the
          `file` field. The `file` field is a binary upload — represented
          here as `type: string` (rather than `format: binary`) so the
          generated TypeScript client does not depend on the DOM `File`
          global and can be called from non-DOM contexts (Electron main
          process, Node poller scripts, server-to-server calls).
          Pass a Blob/File at runtime; the generated client appends every
          field to a FormData and posts as multipart.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - iteroOrderId
                - labOrganizationId
                - providerOrganizationId
              properties:
                file:
                  type: string
                  description: Rx PDF or image (binary upload)
                iteroOrderId:
                  type: string
                labOrganizationId:
                  type: string
                providerOrganizationId:
                  type: string
                doctorNameHint:
                  type: string
                patientFirstNameHint:
                  type: string
                patientLastNameHint:
                  type: string
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
        "200":
          description: Already imported (deduped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
  /doctors/merge:
    post:
      operationId: mergeDoctors
      tags: [cases]
      summary: Merge two doctor entries into one
      description: |
        Reassign every non-soft-deleted case from the source doctor
        (identified by `(sourceDoctorName, sourceProviderOrganizationId)`)
        to the target doctor (identified by
        `(targetDoctorName, targetProviderOrganizationId)`). Both provider
        practices must belong to the same parent lab and the caller must be
        an admin of that lab. Idempotent: if the source group is already
        empty the call still succeeds with `casesMoved: 0`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sourceDoctorName
                - sourceProviderOrganizationId
                - targetDoctorName
                - targetProviderOrganizationId
              properties:
                sourceDoctorName: { type: string }
                sourceProviderOrganizationId: { type: string }
                targetDoctorName: { type: string }
                targetProviderOrganizationId: { type: string }
      responses:
        "200":
          description: Merge complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergeResult"
  /cases/{caseId}/ai-review:
    patch:
      operationId: acknowledgeAiReview
      tags: [cases]
      summary: Acknowledge an AI-imported case as reviewed
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      caseId: { type: string }
                      needsAiReview: { type: boolean }
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DoctorMergeResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            casesMoved: { type: integer }
            sourceDoctorName: { type: string }
            sourceProviderOrganizationId: { type: string }
            targetDoctorName: { type: string }
            targetProviderOrganizationId: { type: string }
    IteroImportResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            deduped: { type: boolean }
            caseId: { type: string, nullable: true }
            caseNumber: { type: string, nullable: true }
            needsAiReview: { type: boolean }
            attachmentId: { type: string, nullable: true }
            iteroOrderId: { type: string }


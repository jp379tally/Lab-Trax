openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Case operations (LabTrax)
  - name: doctors
    description: Doctor / merge operations (LabTrax)
  - name: invoices
    description: Invoice + payment operations (LabTrax)
  - name: billing
    description: Subscription billing operations (LabTrax)
  - name: notifications
    description: In-app notification operations (LabTrax)
  - name: backup
    description: Backup and schedule operations (LabTrax)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List the calling user's notifications
      description: Returns up to 50 notifications for the authenticated user, newest first.
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResult"
  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      description: Sets read_at = now() on every unread notification for the authenticated user.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      ok: { type: boolean }
  /cases/import-from-itero-rx:
    post:
      operationId: importCaseFromIteroRx
      tags: [cases]
      summary: Import a case from an iTero Lab-Review Rx
      description: |
        Auto-create a LabTrax case from an iTero Lab-Review prescription. The
        Rx file (PDF or image) is uploaded as multipart/form-data with the
        field name `file`. The server uses OpenAI to extract patient, doctor,
        restoration, and notes fields from the Rx, creates an Active case
        with the Rx attached and `needsAiReview=true`, and records the iTero
        order id in `itero_imported_orders` so re-polls are idempotent.
      requestBody:
        required: true
        description: |
          multipart/form-data with the Rx PDF or image attached as the
          `file` field. The `file` field is a binary upload — represented
          here as `type: string` (rather than `format: binary`) so the
          generated TypeScript client does not depend on the DOM `File`
          global and can be called from non-DOM contexts (Electron main
          process, Node poller scripts, server-to-server calls).
          Pass a Blob/File at runtime; the generated client appends every
          field to a FormData and posts as multipart.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - iteroOrderId
                - labOrganizationId
                - providerOrganizationId
              properties:
                file:
                  type: string
                  description: Rx PDF or image (binary upload)
                iteroOrderId:
                  type: string
                labOrganizationId:
                  type: string
                providerOrganizationId:
                  type: string
                doctorNameHint:
                  type: string
                patientFirstNameHint:
                  type: string
                patientLastNameHint:
                  type: string
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
        "200":
          description: Already imported (deduped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
  /doctors/search:
    get:
      operationId: searchDoctors
      tags: [doctors]
      summary: Search doctor groups in a lab, ranked by similarity
      description: |
        Lists distinct (doctorName, providerOrganizationId) groups in the
        given lab, ranked by similarity to the optional `q` / `like`
        parameters using normalized name comparison (trim, lowercase,
        strip "Dr."/punctuation). Used by the desktop merge picker so it
        can search every doctor in the lab without a 50-row cap.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: q
          required: false
          schema: { type: string }
          description: Free-text search across doctor + practice names.
        - in: query
          name: like
          required: false
          schema: { type: string }
          description: |
            Optional reference doctor name; when provided, results are
            ranked by similarity to this name so likely duplicates float
            to the top.
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
          description: |
            Page offset for cursoring through every doctor in a large lab.
      responses:
        "200":
          description: Doctor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorSearchResult"
  /doctors/merge/preview:
    post:
      operationId: previewDoctorMerge
      tags: [doctors]
      summary: Preview a doctor merge before committing
      description: |
        Returns aggregate counts for what a merge would move: per-source
        case count + date range + last few case numbers + count of
        pricing overrides that would follow. Includes soft-deleted cases
        when `includeSoftDeleted` is true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorMergeRequest"
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergePreview"
  /doctors/merge:
    post:
      operationId: mergeDoctors
      tags: [doctors]
      summary: Merge one or more source doctors into a single target
      description: |
        Reassigns every (optionally including soft-deleted) case from each
        source `(doctorName, providerOrganizationId)` group to the target
        `(targetDoctorName, targetProviderOrganizationId)`. Per-doctor
        pricing overrides keyed on `(labOrganizationId, doctorName)` are
        also remapped, collapsing onto an existing target override
        (instead of violating its unique index). Source
        `providerOrganizationId` may be `null`. The target may be a
        brand-new doctor — it does not need any pre-existing cases. The
        caller must be a lab admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorMergeRequest"
      responses:
        "200":
          description: Merge complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergeResult"
  /doctors/merge/{auditLogId}/undo:
    post:
      operationId: undoDoctorMerge
      tags: [doctors]
      summary: Undo a recent doctor merge
      description: |
        Within a configurable time window (default 10 minutes), reverses
        the rename described by a `doctor_merged` audit-log row by
        re-applying the inverse rename to matching cases + pricing
        overrides. Refused if the window has passed, the row is not a
        `doctor_merged` action, or the inverse would clobber doctors
        that have since been edited. Admin-only, same lab as the
        original merge.
      parameters:
        - in: path
          name: auditLogId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Undo complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergeUndoResult"
  /cases/{caseId}/notes/{noteId}/notify:
    post:
      operationId: notifyCaseNote
      tags: [cases]
      summary: Notify the provider about a shared case note
      description: |
        Sends an email or SMS notification to the provider organization's primary
        contact, informing them that a new note has been shared on the case. The
        note must have `visibility = shared_with_provider`. Only lab members may
        call this endpoint. Returns 422 when the provider org has no contact
        info for the requested method.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
        - in: path
          name: noteId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [email, sms]
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      ok: { type: boolean }
        "422":
          description: Provider has no contact info for the requested method
        "403":
          description: Caller is not a lab member
  /cases/{caseId}:
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update case fields
      description: |
        Partially update a case. All fields are optional. The caller must be
        an active member of the case's lab organization.
        `providerOrganizationId` is validated to be an active, non-deleted
        provider org belonging to the same lab before it is applied.
        `clearSuggestion: true` erases the AI-generated doctor suggestion
        without affecting any other fields.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseInput"
      responses:
        "200":
          description: Updated case row
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    description: Raw updated case row (Drizzle shape)
        "400":
          description: Validation error or invalid providerOrganizationId
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case not found or caller lacks access
  /cases/{caseId}/ai-review:
    patch:
      operationId: acknowledgeAiReview
      tags: [cases]
      summary: Acknowledge an AI-imported case as reviewed
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      caseId: { type: string }
                      needsAiReview: { type: boolean }
  /pricing/item-labels:
    get:
      operationId: getItemLabels
      tags: [invoices]
      summary: Get admin-configured line item labels for the caller's lab
      description: |
        Returns the merged label map for the caller's lab: admin-configured
        labels where set, and static defaults for the rest. Every known price
        key is always included in the response. Any active lab member may call
        this endpoint.
      parameters:
        - in: query
          name: labOrganizationId
          required: false
          schema: { type: string }
          description: Lab org to fetch labels for. Defaults to the caller's first active lab.
      responses:
        "200":
          description: Label map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLabelsResult"
    put:
      operationId: updateItemLabels
      tags: [invoices]
      summary: Upsert admin-configured line item labels for the caller's lab
      description: |
        Saves the provided label map for the caller's lab. Each key in
        `labels` must be a known standard price key (unknown keys are
        silently ignored). Restricted to lab admins. Only keys present in the
        request body are updated; omitted keys are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemLabelsInput"
      responses:
        "200":
          description: Updated label map (merged with static defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLabelsResult"
        "403":
          description: Caller is not a lab administrator.
  /lab-orgs/{orgId}/statement-schedule:
    get:
      operationId: getStatementSchedule
      tags: [invoices]
      summary: Get or create the auto-send schedule for a lab
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Statement schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementScheduleResult"
    put:
      operationId: updateStatementSchedule
      tags: [invoices]
      summary: Update the auto-send schedule for a lab
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatementScheduleInput"
      responses:
        "200":
          description: Updated statement schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementScheduleResult"
  /invoices/open:
    get:
      operationId: listOpenInvoices
      tags: [invoices]
      summary: List open invoices for a provider/practice (Receive Payments)
      description: |
        Returns the open (issued or partially-paid) invoices the lab can
        currently receive payments against. Requires the caller to have a
        billing role (owner, admin, or billing) in `labOrganizationId`.
      parameters:
        - name: labOrganizationId
          in: query
          required: true
          schema: { type: string }
          description: Lab organization to scope the invoices to.
        - name: providerOrganizationId
          in: query
          required: true
          schema: { type: string }
          description: Provider/practice to filter open invoices for.
      responses:
        "200":
          description: Open-invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenInvoiceListResult"
        "403":
          description: Caller lacks a billing role on the lab.
  /admin/backup/run:
    post:
      operationId: runBackupNow
      tags: [backup]
      summary: Run an immediate full backup
      description: |
        Triggers an immediate full backup (all cases, invoices, media, etc.)
        to the chosen destination. Requires the X-Platform-Admin-Secret header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupRunRequest"
      responses:
        "200":
          description: Backup completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupRunResult"
        "400":
          description: Invalid destination or missing path
        "403":
          description: Admin access required
  /admin/backup/schedule:
    get:
      operationId: getBackupSchedule
      tags: [backup]
      summary: Get the current backup schedule configuration
      description: |
        Returns the recurring backup schedule stored in system settings.
        Requires the X-Platform-Admin-Secret header.
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupScheduleResult"
        "403":
          description: Admin access required
    put:
      operationId: saveBackupSchedule
      tags: [backup]
      summary: Save the recurring backup schedule
      description: |
        Persists the schedule configuration to system settings and restarts
        the in-process recurring backup job. Requires the
        X-Platform-Admin-Secret header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupScheduleInput"
      responses:
        "200":
          description: Schedule saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupScheduleResult"
        "400":
          description: Invalid interval or destination
        "403":
          description: Admin access required
    delete:
      operationId: disableBackupSchedule
      tags: [backup]
      summary: Disable the recurring backup schedule
      description: |
        Sets the schedule to disabled in system settings and stops the
        in-process interval job. Requires the X-Platform-Admin-Secret header.
      responses:
        "200":
          description: Schedule disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  enabled: { type: boolean }
        "403":
          description: Admin access required
  /invoices/receive-payments:
    post:
      operationId: receiveInvoicePayments
      tags: [invoices]
      summary: Apply a single payment across multiple open invoices
      description: |
        QuickBooks-style "Receive Payments" — record one payment from a
        provider, distribute it across one or more open invoices, and post
        the combined deposit to a bank account in a single database
        transaction. Requires a billing role on `labOrganizationId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceivePaymentsInput"
      responses:
        "201":
          description: Payments recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceivePaymentsResult"
        "400":
          description: Invalid input or per-invoice amount exceeds balance.
        "403":
          description: Caller lacks a billing role on the lab.
components:
  schemas:
    ItemLabelsResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          required: [labOrganizationId, labels]
          properties:
            labOrganizationId: { type: string }
            labels:
              type: object
              description: Map of priceKey → display label (all known keys always included)
              additionalProperties: { type: string }
    ItemLabelsInput:
      type: object
      required: [labels]
      properties:
        labOrganizationId:
          type: string
          description: Lab org to update. Defaults to the caller's first admin lab.
        labels:
          type: object
          description: Partial map of priceKey → display label to upsert.
          additionalProperties: { type: string }
    Notification:
      type: object
      required: [id, userId, type, title, body, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        dataJson:
          nullable: true
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    NotificationListResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/Notification" }
    BackupRunRequest:
      type: object
      required: [destination]
      properties:
        destination:
          type: string
          enum: [onedrive, local, network]
        path:
          type: string
          nullable: true
          description: Target folder path (required for local and network destinations)
    BackupRunResult:
      type: object
      properties:
        ok: { type: boolean }
        size: { type: integer, description: "Backup archive size in bytes" }
        completedAt: { type: string, format: date-time }
        fileName: { type: string }
    BackupScheduleInput:
      type: object
      required: [interval, unit, destination, enabled]
      properties:
        interval:
          type: integer
          description: "Number of interval units between backups (e.g. 15 minutes, 1 hour)"
        unit:
          type: string
          enum: [minutes, hours]
          description: "Unit for the interval value"
        destination:
          type: string
          enum: [onedrive, local, network]
        path:
          type: string
          nullable: true
        enabled:
          type: boolean
    BackupScheduleResult:
      type: object
      properties:
        ok: { type: boolean }
        interval:
          type: integer
          nullable: true
          description: "Number of interval units (null if no schedule is set)"
        unit:
          type: string
          nullable: true
          enum: [minutes, hours]
          description: "Unit for the interval value"
        destination:
          type: string
          nullable: true
          enum: [onedrive, local, network]
        path:
          type: string
          nullable: true
        enabled: { type: boolean }
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DoctorMergeSource:
      type: object
      required:
        - doctorName
      properties:
        doctorName: { type: string }
        providerOrganizationId:
          type: string
          nullable: true
          description: |
            May be `null` for legacy cases that were created without a
            practice attached.
    DoctorMergeRequest:
      type: object
      required:
        - sources
        - targetDoctorName
        - labOrganizationId
      properties:
        sources:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/DoctorMergeSource"
        targetDoctorName: { type: string }
        targetProviderOrganizationId:
          type: string
          nullable: true
          description: |
            Practice that will own the target doctor's cases. Must be
            supplied — even if the target had no cases before the merge —
            so the merge can resolve practice-less targets in one call.
        labOrganizationId: { type: string }
        includeSoftDeleted:
          type: boolean
          default: false
          description: |
            When true, soft-deleted cases under each source group are
            also remapped to the target.
    DoctorMergeAuditEntry:
      type: object
      properties:
        auditLogId: { type: string }
        sourceDoctorName: { type: string }
        sourceProviderOrganizationId:
          type: string
          nullable: true
        casesMoved: { type: integer }
        overridesMoved: { type: integer }
        overridesCollapsed: { type: integer }
    DoctorMergeResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            casesMoved: { type: integer }
            overridesMoved: { type: integer }
            overridesCollapsed: { type: integer }
            targetDoctorName: { type: string }
            targetProviderOrganizationId:
              type: string
              nullable: true
            undoWindowMs:
              type: integer
              description: |
                How many milliseconds the undo button should remain
                actionable, mirroring the server's configured window
                (`DOCTOR_MERGE_UNDO_WINDOW_MINUTES`).
            entries:
              type: array
              items:
                $ref: "#/components/schemas/DoctorMergeAuditEntry"
    DoctorMergePreviewSource:
      type: object
      properties:
        doctorName: { type: string }
        providerOrganizationId:
          type: string
          nullable: true
        practiceName:
          type: string
          nullable: true
        totalCases: { type: integer }
        firstCaseAt:
          type: string
          nullable: true
        lastCaseAt:
          type: string
          nullable: true
        recentCaseNumbers:
          type: array
          items: { type: string }
        overridesCount: { type: integer }
    DoctorMergePreview:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            totalCases: { type: integer }
            totalOverrides: { type: integer }
            sources:
              type: array
              items:
                $ref: "#/components/schemas/DoctorMergePreviewSource"
            targetExists: { type: boolean }
            targetCases: { type: integer }
    DoctorMergeUndoResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            casesReverted: { type: integer }
            overridesReverted: { type: integer }
            sourceDoctorName: { type: string }
            sourceProviderOrganizationId:
              type: string
              nullable: true
    DoctorSearchEntry:
      type: object
      properties:
        doctorName: { type: string }
        providerOrganizationId:
          type: string
          nullable: true
        practiceName:
          type: string
          nullable: true
        totalCases: { type: integer }
        similarity:
          type: number
          description: |
            0..1 similarity to the `like` query parameter, or 0 when
            `like` was not supplied.
    DoctorSearchResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            entries:
              type: array
              items:
                $ref: "#/components/schemas/DoctorSearchEntry"
            total: { type: integer }
            offset: { type: integer }
            limit: { type: integer }
    UpdateCaseInput:
      type: object
      properties:
        status:
          type: string
          enum: [received, in_design, in_milling, in_porcelain, qc, shipped, delivered, on_hold, remake, cancelled]
        priority:
          type: string
          enum: [normal, rush]
        dueDate: { type: string, format: date-time }
        doctorName: { type: string }
        patientFirstName: { type: string }
        patientLastName: { type: string }
        providerOrganizationId:
          type: string
          description: |
            Re-assign the case to a different provider organization.
            Must be an active provider org that belongs to the same lab
            as the case (validated server-side).
        clearSuggestion:
          type: boolean
          description: |
            When `true`, clears the AI-generated `suggestedDoctorName` and
            `suggestedProviderOrgId` fields without affecting any other
            case fields. Used by the "Keep as-is" action in the desktop
            review banner.
    IteroImportResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            deduped: { type: boolean }
            caseId: { type: string, nullable: true }
            caseNumber: { type: string, nullable: true }
            needsAiReview: { type: boolean }
            attachmentId: { type: string, nullable: true }
            iteroOrderId: { type: string }
            suggestedDoctorName:
              type: string
              nullable: true
              description: |
                Present when the AI-extracted doctor name closely matches
                (but does not exactly equal) an existing doctor on file.
                Shown as a "Did you mean?" prompt in the desktop review
                banner. Cleared via `PATCH /cases/{caseId}` with
                `clearSuggestion: true`.
            suggestedProviderOrgId:
              type: string
              nullable: true
              description: Provider org id of the suggested match doctor.
            suggestedPracticeName:
              type: string
              nullable: true
              description: |
                Display name of the suggested provider org, resolved
                server-side so the desktop banner needs no extra round-trip.
    OpenInvoice:
      type: object
      required:
        - id
        - invoiceNumber
        - status
        - total
        - balanceDue
        - labOrganizationId
        - providerOrganizationId
      properties:
        id: { type: string }
        invoiceNumber: { type: string }
        status: { type: string, description: "open | partially_paid | overdue" }
        total: { type: string, description: "Decimal string" }
        balanceDue: { type: string, description: "Decimal string" }
        issuedAt: { type: string, format: date-time, nullable: true }
        dueAt: { type: string, format: date-time, nullable: true }
        ageDays: { type: integer, nullable: true }
        labOrganizationId: { type: string }
        providerOrganizationId: { type: string }
    OpenInvoiceListResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/OpenInvoice" }
    PaymentApplication:
      type: object
      required: [invoiceId, amount]
      properties:
        invoiceId: { type: string }
        amount: { type: number, minimum: 0.01 }
    ReceivePaymentsInput:
      type: object
      required:
        - labOrganizationId
        - providerOrganizationId
        - paymentMethod
        - depositBankAccountId
        - applications
      properties:
        labOrganizationId: { type: string }
        providerOrganizationId: { type: string }
        paymentMethod:
          type: string
          enum: [card, ach, check, cash, other]
        referenceNumber: { type: string, nullable: true }
        paymentDate: { type: string, format: date-time }
        depositBankAccountId: { type: string }
        memo: { type: string, nullable: true }
        applications:
          type: array
          minItems: 1
          maxItems: 500
          items: { $ref: "#/components/schemas/PaymentApplication" }
    StatementSchedule:
      type: object
      required:
        - id
        - labOrganizationId
        - enabled
        - dayOfMonth
      properties:
        id: { type: string }
        labOrganizationId: { type: string }
        enabled: { type: boolean }
        # 0 = last day of month; 1–31 = specific numbered day (clamped to month length)
        dayOfMonth:
          type: integer
          minimum: 0
          maximum: 31
        emailSubject: { type: string, nullable: true }
        emailBody: { type: string, nullable: true }
        emailReplyTo: { type: string, nullable: true }
        # null = all practices with activity; non-empty array = only these practice IDs
        includedOrgIds:
          type: array
          nullable: true
          items: { type: string }
        lastSentForMonth: { type: string, nullable: true }
        lastRunAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    StatementScheduleResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/StatementSchedule"
    StatementScheduleInput:
      type: object
      required:
        - enabled
        - dayOfMonth
      properties:
        enabled: { type: boolean }
        dayOfMonth:
          type: integer
          minimum: 0
          maximum: 31
          description: 0 = last day of month; 1–31 = specific numbered day
        emailSubject: { type: string, nullable: true, maxLength: 998 }
        emailBody: { type: string, nullable: true, maxLength: 20000 }
        emailReplyTo: { type: string, nullable: true, maxLength: 320 }
        includedOrgIds:
          type: array
          nullable: true
          maxItems: 500
          items: { type: string }
          description: null or omitted = send to all; non-empty = only these practice IDs
    ReceivePaymentsResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          required:
            - payments
            - invoices
            - depositTransactionId
            - totalApplied
          properties:
            payments:
              type: array
              items:
                type: object
                required: [id, invoiceId, amount]
                properties:
                  id: { type: string }
                  invoiceId: { type: string }
                  amount: { type: string }
            invoices:
              type: array
              items:
                type: object
                required: [id, status, balanceDue]
                properties:
                  id: { type: string }
                  status: { type: string }
                  balanceDue: { type: string }
            depositTransactionId: { type: string }
            totalApplied: { type: string }


openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: locations
    description: Case location (station) operations (LabTrax)
  - name: vocabulary
    description: Lab vocabulary (material, shade, restoration type) operations (LabTrax)
  - name: ai
    description: AI assistant operations (LabTrax)
  - name: cases
    description: Case operations (LabTrax)
  - name: doctors
    description: Doctor / merge operations (LabTrax)
  - name: invoices
    description: Invoice + payment operations (LabTrax)
  - name: billing
    description: Subscription billing operations (LabTrax)
  - name: notifications
    description: In-app notification operations (LabTrax)
  - name: backup
    description: Backup and schedule operations (LabTrax)
  - name: users
    description: User profile and preference operations (LabTrax)
  - name: messenger
    description: Real-time direct-message operations (LabTrax)
  - name: auth
    description: Authentication, registration, sessions, and verification (LabTrax)
  - name: organizations
    description: Organization, membership, and invitation operations (LabTrax)
  - name: audit
    description: Audit-log read operations (LabTrax)
  - name: lab-inbox
    description: Unassigned Documents inbox operations (LabTrax)
paths:
  /lab-inbox:
    get:
      operationId: listLabInboxFiles
      tags: [lab-inbox]
      summary: List unassigned inbox files for a lab (lab members only)
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unassigned inbox files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabInboxFileListResult"
        "400":
          description: Missing labOrganizationId
        "403":
          description: Not a lab member
  /lab-inbox/upload:
    post:
      operationId: uploadLabInboxFile
      tags: [lab-inbox]
      summary: Upload a file to the lab inbox (lab members only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, labOrganizationId]
              properties:
                file:
                  type: string
                  format: binary
                labOrganizationId:
                  type: string
      responses:
        "201":
          description: Uploaded file record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabInboxFileResult"
        "400":
          description: Invalid request
        "403":
          description: Not a lab member
  /lab-inbox/{fileId}/assign:
    post:
      operationId: assignLabInboxFile
      tags: [lab-inbox]
      summary: Assign an inbox file to a case (lab members only)
      parameters:
        - in: path
          name: fileId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignLabInboxFileInput"
      responses:
        "200":
          description: Assignment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignLabInboxFileResult"
        "400":
          description: Invalid request
        "403":
          description: Not a lab member
        "404":
          description: File or case not found
        "409":
          description: File already assigned
  /ai-chat/history:
    get:
      operationId: getAiChatHistory
      tags: [ai]
      summary: Fetch recent AI chat history for the authenticated user
      responses:
        "200":
          description: Chat history messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatHistoryResult"
        "401":
          description: Not authenticated
    delete:
      operationId: deleteAiChatHistory
      tags: [ai]
      summary: Clear all AI chat history for the authenticated user
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Not authenticated
  /locations:
    get:
      operationId: getLocations
      tags: [locations]
      summary: List lab locations for an org (seeds built-in stations on first call)
      parameters:
        - in: query
          name: organizationId
          required: true
          schema: { type: string }
        - in: query
          name: activeOnly
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabLocationListResult"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a lab location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabLocationResult"
  /vocabulary:
    get:
      operationId: getVocabulary
      tags: [vocabulary]
      summary: List vocabulary items for a lab org (defaults + custom)
      parameters:
        - in: query
          name: kind
          required: true
          schema:
            type: string
            enum: [material, shade, restoration_type]
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyListResult"
    post:
      operationId: createVocabularyItem
      tags: [vocabulary]
      summary: Add a custom vocabulary item (deduped case-insensitively)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVocabularyInput"
      responses:
        "200":
          description: Existing item (default or prior custom)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyItemResult"
        "201":
          description: Newly created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyItemResult"
  /vocabulary/{id}:
    patch:
      operationId: updateVocabularyItem
      tags: [vocabulary]
      summary: Rename a custom vocabulary item (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVocabularyInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyItemResult"
        "404":
          description: Not found
        "409":
          description: Conflict (duplicate value)
    delete:
      operationId: deleteVocabularyItem
      tags: [vocabulary]
      summary: Delete a custom vocabulary item (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [deleted]
                    properties:
                      deleted: { type: boolean }
        "404":
          description: Not found
  /ai-memory:
    get:
      operationId: getAiMemory
      tags: [ai]
      summary: List AI memory entries for a lab org (any active member)
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [glossary, preference, fact]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryListResult"
    post:
      operationId: createAiMemory
      tags: [ai]
      summary: Create an AI memory entry (lab admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiMemoryInput"
      responses:
        "201":
          description: Newly created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryItemResult"
        "409":
          description: Conflict (duplicate key)
  /ai-memory/candidates:
    get:
      operationId: getAiMemoryCandidates
      tags: [ai]
      summary: List pending AI-learned memory candidates for a lab org (lab admin only)
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryCandidateListResult"
  /ai-memory/candidates/{id}/approve:
    post:
      operationId: approveAiMemoryCandidate
      tags: [ai]
      summary: Approve a candidate into AI memory (lab admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveAiMemoryCandidateInput"
      responses:
        "200":
          description: Created/updated memory entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryItemResult"
        "404":
          description: Not found
  /ai-memory/candidates/{id}/reject:
    post:
      operationId: rejectAiMemoryCandidate
      tags: [ai]
      summary: Reject an AI-learned memory candidate (lab admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rejected candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryCandidateItemResult"
        "404":
          description: Not found
  /ai-memory/{id}:
    patch:
      operationId: updateAiMemory
      tags: [ai]
      summary: Update an AI memory entry (lab admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiMemoryInput"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMemoryItemResult"
        "404":
          description: Not found
        "409":
          description: Conflict (duplicate key)
    delete:
      operationId: deleteAiMemory
      tags: [ai]
      summary: Soft-delete an AI memory entry (lab admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [deleted]
                    properties:
                      deleted: { type: boolean }
        "404":
          description: Not found
  /locations/{id}:
    patch:
      operationId: updateLocation
      tags: [locations]
      summary: Update a lab location
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabLocationResult"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a lab location
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [deleted]
                    properties:
                      deleted: { type: boolean }
  /ai-chat:
    post:
      operationId: postAiChat
      tags: [ai]
      summary: Send a message to the context-aware AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResult"
        "400":
          description: Bad request
        "503":
          description: AI not configured
  /finance/vendors:
    get:
      operationId: listVendors
      tags: [finance]
      summary: List vendors / employees / items for a lab
      parameters:
        - in: query
          name: organizationId
          required: true
          schema: { type: string }
        - in: query
          name: vendorType
          schema:
            $ref: "#/components/schemas/VendorType"
        - in: query
          name: includeInactive
          schema: { type: boolean }
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorListResult"
    post:
      operationId: createVendor
      tags: [finance]
      summary: Create a vendor / employee / item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorInput"
      responses:
        "200":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResult"
  /finance/vendors/import:
    post:
      operationId: importVendors
      tags: [finance]
      summary: Bulk-import vendors from CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorEmployeeImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorImportResult"
  /finance/employees/import:
    post:
      operationId: importEmployees
      tags: [finance]
      summary: Bulk-import employees from CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorEmployeeImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorImportResult"
  /finance/vendors/{vendorId}:
    patch:
      operationId: updateVendor
      tags: [finance]
      summary: Update a vendor / employee / item
      parameters:
        - in: path
          name: vendorId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorInput"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResult"
    delete:
      operationId: deleteVendor
      tags: [finance]
      summary: Deactivate a vendor / employee / item (sets isActive=false)
      parameters:
        - in: path
          name: vendorId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deactivated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResult"
  /finance/categories:
    get:
      operationId: listCategories
      tags: [finance]
      summary: List transaction categories for a lab
      parameters:
        - in: query
          name: organizationId
          required: true
          schema: { type: string }
        - in: query
          name: includeArchived
          schema: { type: boolean }
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategoryListResult"
    post:
      operationId: createCategory
      tags: [finance]
      summary: Create a transaction category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "200":
          description: Created or existing category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategoryResult"
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategoryResult"
  /finance/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [finance]
      summary: Update a transaction category
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategoryResult"
    delete:
      operationId: archiveCategory
      tags: [finance]
      summary: Archive a transaction category (sets isArchived=true)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Archived category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategoryResult"
  /users/me/email-preferences:
    get:
      operationId: getEmailPreferences
      tags: [users]
      summary: Get the authenticated user's email notification preferences
      description: Returns the stored preferences merged with all-true defaults so missing keys are always ON.
      responses:
        "200":
          description: Email preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailPreferencesResult"
    patch:
      operationId: updateEmailPreferences
      tags: [users]
      summary: Update the authenticated user's email notification preferences
      description: Accepts a partial update — only provided keys are written. Omitted keys are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailPreferencesInput"
      responses:
        "200":
          description: Updated email preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailPreferencesResult"
  /users/me/sms-preferences:
    get:
      operationId: getSmsPreferences
      tags: [users]
      summary: Get the authenticated user's SMS notification preferences
      description: Returns the stored preferences merged with all-true defaults so missing keys are always ON.
      responses:
        "200":
          description: SMS preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsPreferencesResult"
    patch:
      operationId: updateSmsPreferences
      tags: [users]
      summary: Update the authenticated user's SMS notification preferences
      description: Accepts a partial update — only provided keys are written. Omitted keys are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsPreferencesInput"
      responses:
        "200":
          description: Updated SMS preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsPreferencesResult"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List the calling user's notifications
      description: Returns up to 50 notifications for the authenticated user, newest first.
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResult"
  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      description: Sets read_at = now() on every unread notification for the authenticated user.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      ok: { type: boolean }
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List cases visible to the authenticated user
      description: |
        Returns up to 500 most-recent canonical cases (plus projected legacy
        mobile cases) for all organizations the caller is a member of, or a
        single org when `organizationId` is provided. Provider users
        automatically include cross-lab linked-doctor cases.
      parameters:
        - name: organizationId
          in: query
          schema: { type: string }
          description: Filter to a single lab/provider org (optional).
        - name: include
          in: query
          schema: { type: string }
          description: Comma-separated extras to include (e.g. "restorations").
        - name: barcode
          in: query
          schema: { type: string }
          description: |
            Filter to cases whose pan barcode exactly matches this value
            (tenant-scoped). Useful for spotting duplicate-barcode conflicts
            before assigning a barcode to a new case.
      responses:
        "200":
          description: Case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResult"
        "401":
          description: Not authenticated
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a canonical case
      description: |
        Creates a new case row in the canonical `cases` table. The caller must
        be an active member of `labOrganizationId`. Auto-generates an invoice
        when the case has a `providerOrganizationId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseInput"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetailResult"
        "400":
          description: Validation error
        "403":
          description: Caller is not a member of the lab
        "503":
          description: Server busy — retry
  /cases/provider:
    get:
      operationId: listProviderCases
      tags: [cases]
      summary: List the authenticated provider's assigned cases
      description: |
        Provider-portal foundation. Returns up to 500 most-recent canonical
        cases whose `providerOrganizationId` belongs to the caller's own
        provider organization(s), expanded across cross-lab linked-doctor
        identities. Strictly provider-scoped: never returns lab-only cases or
        another provider's cases, and is not influenced by any client-supplied
        org id. A caller with no provider organization receives an empty list.
      responses:
        "200":
          description: Provider case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResult"
        "401":
          description: Not authenticated
  /cases/bulk-status:
    post:
      operationId: bulkChangeCaseStatus
      tags: [cases]
      summary: Change the status of multiple cases at once
      description: |
        Updates a list of cases to the same status in one operation. Every
        case ID must belong to a lab the caller is a member of. Returns the
        count of cases actually updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkStatusCasesInput"
      responses:
        "200":
          description: Cases updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkStatusCasesResult"
        "400":
          description: Validation error
        "403":
          description: Caller is not a member of the cases' lab
        "404":
          description: One or more case IDs not found
  /cases/bulk-reassign:
    post:
      operationId: bulkReassignCases
      tags: [cases]
      summary: Reassign multiple cases to a different practice
      description: |
        Reassigns a list of cases to a new provider organization in one
        operation. Every case ID must belong to a lab the caller is a member
        of. Returns the count of cases actually updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReassignCasesInput"
      responses:
        "200":
          description: Cases reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReassignCasesResult"
        "400":
          description: Validation error or target practice not found
        "403":
          description: Caller is not a member of the cases' lab
        "404":
          description: One or more case IDs not found
  /cases/import-from-itero-rx:
    post:
      operationId: importCaseFromIteroRx
      tags: [cases]
      summary: Import a case from an iTero Lab-Review Rx
      description: |
        Auto-create a LabTrax case from an iTero Lab-Review prescription. The
        Rx file (PDF or image) is uploaded as multipart/form-data with the
        field name `file`. The server uses OpenAI to extract patient, doctor,
        restoration, and notes fields from the Rx, creates an Active case
        with the Rx attached and `needsAiReview=true`, and records the iTero
        order id in `itero_imported_orders` so re-polls are idempotent.
      requestBody:
        required: true
        description: |
          multipart/form-data with the Rx PDF or image attached as the
          `file` field. The `file` field is a binary upload — represented
          here as `type: string` (rather than `format: binary`) so the
          generated TypeScript client does not depend on the DOM `File`
          global and can be called from non-DOM contexts (Electron main
          process, Node poller scripts, server-to-server calls).
          Pass a Blob/File at runtime; the generated client appends every
          field to a FormData and posts as multipart.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - iteroOrderId
                - labOrganizationId
                - providerOrganizationId
              properties:
                file:
                  type: string
                  description: Rx PDF or image (binary upload)
                iteroOrderId:
                  type: string
                labOrganizationId:
                  type: string
                providerOrganizationId:
                  type: string
                doctorNameHint:
                  type: string
                patientFirstNameHint:
                  type: string
                patientLastNameHint:
                  type: string
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
        "200":
          description: Already imported (deduped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportResult"
  /cases/import-from-itero-zip:
    post:
      operationId: importCaseFromIteroZip
      tags: [cases]
      summary: Import a case from an iTero export ZIP
      description: |
        Accepts a full iTero export ZIP (e.g. OrthoCAD_Export_306682066.zip).
        The server locates the `iTero_Rx_*.pdf` inside, uses AI to create a
        case (same flow as `/cases/import-from-itero-rx`), attaches the Rx as
        the primary attachment, and attaches every other file in the ZIP to the
        new case. The iTero order ID is derived from the Rx filename; the ZIP
        filename is used as a fallback. Duplicate detection is the same as the
        single-file flow: an already-imported order returns `deduped: true`.
      requestBody:
        required: true
        description: |
          multipart/form-data with the full iTero export ZIP attached as the
          `file` field. The `file` field is a binary upload represented as
          `type: string` so the generated TypeScript client does not depend on
          the DOM `File` global.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - labOrganizationId
                - providerOrganizationId
              properties:
                file:
                  type: string
                  description: iTero export ZIP (binary upload, max 300 MB)
                labOrganizationId:
                  type: string
                providerOrganizationId:
                  type: string
                doctorNameHint:
                  type: string
                patientFirstNameHint:
                  type: string
                patientLastNameHint:
                  type: string
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroZipImportResult"
        "200":
          description: Already imported (deduped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroZipImportResult"
  /cases/import-from-itero-zip-batch:
    post:
      operationId: importCasesFromIteroZipBatch
      tags: [cases]
      summary: Batch-import cases from multiple iTero export ZIPs
      description: |
        Accepts up to 20 iTero export ZIP files in a single multipart request
        (`files[]` field). Each ZIP is processed independently: the server
        extracts the `iTero_Rx_*.pdf`, uses AI to create a case, and attaches
        every `.ply` scan found in the same ZIP to that case. Returns a
        per-file result array so the client can show granular status. Errors on
        individual ZIPs are captured per-entry and do not abort the batch.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files[]
                - labOrganizationId
              properties:
                files[]:
                  type: array
                  items:
                    type: string
                    description: iTero export ZIP (binary upload, max 300 MB each)
                  description: Up to 20 iTero export ZIPs
                labOrganizationId:
                  type: string
                providerOrganizationId:
                  type: string
                  description: Optional — if omitted the case is created without a linked practice.
                doctorNameHint:
                  type: string
                patientFirstNameHint:
                  type: string
                patientLastNameHint:
                  type: string
      responses:
        "207":
          description: Per-file results (success, deduped, or error for each ZIP)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroZipBatchImportResult"
  /cases/barcode/{code}:
    get:
      operationId: getCaseByBarcode
      tags: [cases]
      summary: Find a case by its pan barcode
      description: |
        Returns the single case whose `casePanBarcode` exactly matches the
        given code within the specified lab, or 404 if none exists. The
        caller must be an active member of the lab. Designed for physical
        barcode scanner workflows that need a precise one-to-one lookup.
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
          description: The exact pan barcode value to look up.
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
          description: The lab the barcode belongs to.
      responses:
        "200":
          description: Matching case
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      case:
                        type: object
                        description: The matching case row (Drizzle shape)
        "400":
          description: Missing labOrganizationId or code
        "403":
          description: Caller is not a member of the lab
        "404":
          description: No case found with that barcode
  /cases/patient-similarity:
    get:
      operationId: getPatientSimilarity
      tags: [cases]
      summary: Find similar patients for duplicate/remake detection
      description: |
        Returns patient-similarity hits for the given first+last name within a
        lab (and optional provider org or doctor name). Uses bigram similarity
        and nickname matching to surface potential duplicates. The caller must
        be an active member of `labOrganizationId`. Results are capped at
        `limit` (default 50, max 200); when truncated the response includes
        `truncated: true` and `totalFound`.
      parameters:
        - in: query
          name: patientFirstName
          required: true
          schema: { type: string }
        - in: query
          name: patientLastName
          required: true
          schema: { type: string }
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: providerOrganizationId
          required: false
          schema: { type: string }
          description: Scope results to a specific provider org when known.
        - in: query
          name: doctorName
          required: false
          schema: { type: string }
          description: Fallback doctor-name scope when providerOrganizationId is not known.
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
          description: Maximum number of hits to return (default 50, max 200). When the full result set exceeds this value, the response includes truncated:true and totalFound.
      responses:
        "200":
          description: Similarity matches (may be empty array)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientSimilarityResult"
        "400":
          description: Missing required query parameters
        "403":
          description: Caller is not a member of the lab
  /cases/itero-import-history:
    get:
      operationId: getIteroImportHistory
      tags: [cases]
      summary: Get iTero batch import history for a lab
      description: |
        Returns import sessions grouped by batchId (newest first). Each session
        shows when it ran, who ran it, how many orders were created vs
        deduplicated, and the resulting case IDs so the client can filter the
        cases list to that batch.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Import session history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IteroImportHistoryResult"
  /cases/doctor-names:
    get:
      operationId: getCaseDoctorNames
      tags: [cases]
      summary: Get distinct doctor names across the caller's labs
      description: |
        Returns a sorted list of distinct non-empty doctor names from canonical
        cases and mobile lab_cases rows visible to the caller. Scoped to the
        caller's authorized organizations (direct memberships + cross-lab
        linked provider orgs for provider users). Intended for auto-populating
        the Doctor Name picker without fetching the full cases list.
      responses:
        "200":
          description: Sorted list of distinct doctor names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /doctors/search:
    get:
      operationId: searchDoctors
      tags: [doctors]
      summary: Search doctor groups in a lab, ranked by similarity
      description: |
        Lists distinct (doctorName, providerOrganizationId) groups in the
        given lab, ranked by similarity to the optional `q` / `like`
        parameters using normalized name comparison (trim, lowercase,
        strip "Dr."/punctuation). Used by the desktop merge picker so it
        can search every doctor in the lab without a 50-row cap.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: q
          required: false
          schema: { type: string }
          description: Free-text search across doctor + practice names.
        - in: query
          name: like
          required: false
          schema: { type: string }
          description: |
            Optional reference doctor name; when provided, results are
            ranked by similarity to this name so likely duplicates float
            to the top.
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
          description: |
            Page offset for cursoring through every doctor in a large lab.
      responses:
        "200":
          description: Doctor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorSearchResult"
  /doctors/merge/preview:
    post:
      operationId: previewDoctorMerge
      tags: [doctors]
      summary: Preview a doctor merge before committing
      description: |
        Returns aggregate counts for what a merge would move: per-source
        case count + date range + last few case numbers + count of
        pricing overrides that would follow. Includes soft-deleted cases
        when `includeSoftDeleted` is true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorMergeRequest"
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergePreview"
  /doctors/merge:
    post:
      operationId: mergeDoctors
      tags: [doctors]
      summary: Merge one or more source doctors into a single target
      description: |
        Reassigns every (optionally including soft-deleted) case from each
        source `(doctorName, providerOrganizationId)` group to the target
        `(targetDoctorName, targetProviderOrganizationId)`. Per-doctor
        pricing overrides keyed on `(labOrganizationId, doctorName)` are
        also remapped, collapsing onto an existing target override
        (instead of violating its unique index). Source
        `providerOrganizationId` may be `null`. The target may be a
        brand-new doctor — it does not need any pre-existing cases. The
        caller must be a lab admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorMergeRequest"
      responses:
        "200":
          description: Merge complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergeResult"
  /doctors/merge/{auditLogId}/undo:
    post:
      operationId: undoDoctorMerge
      tags: [doctors]
      summary: Undo a recent doctor merge
      description: |
        Within a configurable time window (default 10 minutes), reverses
        the rename described by a `doctor_merged` audit-log row by
        re-applying the inverse rename to matching cases + pricing
        overrides. Refused if the window has passed, the row is not a
        `doctor_merged` action, or the inverse would clobber doctors
        that have since been edited. Admin-only, same lab as the
        original merge.
      parameters:
        - in: path
          name: auditLogId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Undo complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMergeUndoResult"
  /cases/{caseId}/notes/{noteId}/notify:
    post:
      operationId: notifyCaseNote
      tags: [cases]
      summary: Notify the provider about a shared case note
      description: |
        Sends an email or SMS notification to the provider organization's primary
        contact, informing them that a new note has been shared on the case. The
        note must have `visibility = shared_with_provider`. Only lab members may
        call this endpoint. Returns 422 when the provider org has no contact
        info for the requested method.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
        - in: path
          name: noteId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [email, sms]
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      ok: { type: boolean }
        "422":
          description: Provider has no contact info for the requested method
        "403":
          description: Caller is not a lab member
  /cases/{caseId}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get full case detail
      description: |
        Returns the full case detail including restorations, notes, attachments,
        events, and location history. Falls back to projecting a legacy mobile
        case when the ID is not found in the canonical `cases` table.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetailResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case not found
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update case fields
      description: |
        Partially update a case. All fields are optional. The caller must be
        an active member of the case's lab organization.
        `providerOrganizationId` is validated to be an active, non-deleted
        provider org belonging to the same lab before it is applied.
        `clearSuggestion: true` erases the AI-generated doctor suggestion
        without affecting any other fields.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseInput"
      responses:
        "200":
          description: Updated case row
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    description: Raw updated case row (Drizzle shape)
        "400":
          description: Validation error or invalid providerOrganizationId
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case not found or caller lacks access
  /cases/bulk-restore:
    post:
      operationId: bulkRestoreCases
      tags: [cases]
      summary: Restore multiple soft-deleted cases and unfreeze linked invoices
      description: |
        Restores up to 200 soft-deleted cases in a single call. For each case,
        clears `deleted_at` / `deleted_by_user_id` and unfreezes any linked
        invoices frozen when the case was deleted. Cases that cannot be restored
        (not found, wrong lab, already active) are returned in `failed` rather
        than aborting the whole batch. The caller must be an admin of the
        specified lab.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [caseIds, labOrganizationId]
              properties:
                caseIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 200
                labOrganizationId:
                  type: string
      responses:
        "200":
          description: Bulk restore result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      restored:
                        type: array
                        items: { type: string }
                        description: IDs of successfully restored cases
                      failed:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            reason: { type: string }
                        description: Cases that could not be restored
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Caller is not an admin of the specified lab
  /cases/{caseId}/restore:
    post:
      operationId: restoreCase
      tags: [cases]
      summary: Restore a soft-deleted case and unfreeze linked invoices
      description: |
        Restores a soft-deleted case by clearing its `deleted_at` /
        `deleted_by_user_id` columns and unfreezes every linked non-deleted
        invoice that was frozen when the case was deleted (clears `frozen`,
        `caseDeletedAt`, `caseDeletedByUserId`, `caseDeletedNote`, and
        restores `balanceDue` to the invoice `total`). An audit log entry is
        written for each unfrozen invoice. The caller must be an admin of the
        case's lab.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Case restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      restored: { type: boolean }
                      unfrozenInvoices:
                        type: integer
                        description: Number of invoices that were unfrozen
        "401":
          description: Not authenticated
        "403":
          description: Caller is not an admin of the case's lab
        "404":
          description: Case not found
        "409":
          description: Case is not currently deleted
  /cases/deleted:
    get:
      operationId: listDeletedCases
      tags: [cases]
      summary: List soft-deleted cases for a lab (admin only)
      description: |
        Returns all soft-deleted canonical cases for the given lab, ordered by
        `deletedAt` descending. The caller must be an admin of the lab.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted cases list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      cases:
                        type: array
                        items:
                          type: object
                          required: [id, caseNumber, patientFirstName, patientLastName, doctorName, labOrganizationId, deletedAt, createdAt]
                          properties:
                            id: { type: string }
                            caseNumber: { type: string }
                            patientFirstName: { type: string }
                            patientLastName: { type: string }
                            doctorName: { type: string }
                            labOrganizationId: { type: string }
                            deletedAt: { type: string, format: date-time }
                            deletedByUserId: { type: string, nullable: true }
                            createdAt: { type: string, format: date-time }
        "400":
          description: labOrganizationId is required
        "401":
          description: Not authenticated
        "403":
          description: Caller is not an admin of the lab
  /cases/{caseId}/ai-review:
    patch:
      operationId: acknowledgeAiReview
      tags: [cases]
      summary: Acknowledge an AI-imported case as reviewed
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      caseId: { type: string }
                      needsAiReview: { type: boolean }
  /cases/{caseId}/notes:
    post:
      operationId: addCaseNote
      tags: [cases]
      summary: Add a note to a case
      description: |
        Creates a case note. Lab members author internal or shared notes;
        provider members author notes attributed to their org. Visibility
        defaults to `shared_with_provider`.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCaseNoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNoteResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller lacks access to the case
        "404":
          description: Case not found
  /cases/{caseId}/location-changes:
    post:
      operationId: changeCaseLocation
      tags: [cases]
      summary: Record a case location/station change
      description: |
        Appends a location-change entry for the case (e.g. moving it to a
        new station). Only lab members may call this endpoint.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeCaseLocationInput"
      responses:
        "201":
          description: Location change recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseLocationResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case not found
  /cases/{caseId}/restorations:
    post:
      operationId: addCaseRestoration
      tags: [cases]
      summary: Add a restoration to a case
      description: |
        Adds a restoration line item (crown, pontic, etc.) to a case. Unit
        price is auto-resolved from pricing when `unitPrice` is omitted or 0.
        Only lab members may call this endpoint.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCaseRestorationInput"
      responses:
        "201":
          description: Restoration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseRestorationResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case not found
  /cases/{caseId}/restorations/{restorationId}:
    patch:
      operationId: updateCaseRestoration
      tags: [cases]
      summary: Update a case restoration
      description: |
        Partially updates a restoration line item. All fields are optional.
        Setting `unitPrice` marks the price source as manual. Only lab
        members may call this endpoint.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
        - in: path
          name: restorationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseRestorationInput"
      responses:
        "200":
          description: Restoration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseRestorationResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case or restoration not found
    delete:
      operationId: deleteCaseRestoration
      tags: [cases]
      summary: Delete a case restoration
      description: |
        Removes a restoration line item and keeps the case invoice in sync.
        Only lab members may call this endpoint.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
        - in: path
          name: restorationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Restoration deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller is not a member of the case's lab
        "404":
          description: Case or restoration not found
  /cases/{caseId}/attachments:
    post:
      operationId: uploadCaseAttachment
      tags: [cases]
      summary: Attach an uploaded file to a case
      description: |
        Records a case attachment for a file already uploaded to storage
        (referenced by `storageKey`). Only lab members may attach to a
        canonical case. Visibility defaults to `shared_with_provider`.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseAttachmentInput"
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseAttachmentResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller lacks access to the case
        "404":
          description: Case not found
  /cases/{caseId}/attachments/{attachmentId}:
    delete:
      operationId: deleteCaseAttachment
      tags: [cases]
      summary: Delete a case attachment
      description: |
        Soft-deletes a case attachment. Only lab members may call this
        endpoint.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
        - in: path
          name: attachmentId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Attachment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResult"
        "401":
          description: Not authenticated
        "403":
          description: Caller lacks access to the case
        "404":
          description: Attachment not found
  /pricing/resolve:
    get:
      operationId: resolveItemPrice
      tags: [invoices]
      summary: Resolve the canonical unit price for a case item
      description: |
        Checks per-doctor overrides, practice-level pricing tiers, and lab
        defaults in that priority order — the same logic used when generating
        invoices. Any active lab member may call this endpoint.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
          description: Lab organisation to resolve pricing for.
        - in: query
          name: doctorName
          required: false
          schema: { type: string }
          description: Doctor name for per-doctor override lookup.
        - in: query
          name: caseType
          required: false
          schema: { type: string }
          description: Case/restoration type (e.g. "Crown", "Appliance").
        - in: query
          name: material
          required: false
          schema: { type: string }
          description: Material or appliance subtype (e.g. "Zirconia", "Snore Guard").
      responses:
        "200":
          description: Resolved price for the item
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [price]
                    properties:
                      price:
                        type: number
                        nullable: true
                        description: Resolved unit price, or null when no price can be determined.
        "403":
          description: Caller is not a member of the specified lab.
  /pricing/item-labels:
    get:
      operationId: getItemLabels
      tags: [invoices]
      summary: Get admin-configured line item labels for the caller's lab
      description: |
        Returns the merged label map for the caller's lab: admin-configured
        labels where set, and static defaults for the rest. Every known price
        key is always included in the response. Any active lab member may call
        this endpoint.
      parameters:
        - in: query
          name: labOrganizationId
          required: false
          schema: { type: string }
          description: Lab org to fetch labels for. Defaults to the caller's first active lab.
      responses:
        "200":
          description: Label map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLabelsResult"
    put:
      operationId: updateItemLabels
      tags: [invoices]
      summary: Upsert admin-configured line item labels for the caller's lab
      description: |
        Saves the provided label map for the caller's lab. Each key in
        `labels` must be a known standard price key (unknown keys are
        silently ignored). Restricted to lab admins. Only keys present in the
        request body are updated; omitted keys are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemLabelsInput"
      responses:
        "200":
          description: Updated label map (merged with static defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLabelsResult"
        "403":
          description: Caller is not a lab administrator.
  /lab-orgs/{orgId}/statement-schedule:
    get:
      operationId: getStatementSchedule
      tags: [invoices]
      summary: Get or create the auto-send schedule for a lab
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Statement schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementScheduleResult"
    put:
      operationId: updateStatementSchedule
      tags: [invoices]
      summary: Update the auto-send schedule for a lab
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatementScheduleInput"
      responses:
        "200":
          description: Updated statement schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementScheduleResult"
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices visible to the authenticated user
      description: |
        Returns invoices for all organizations the caller is an active member
        of. Supports filtering by `caseId`, `practiceId`, `practiceIds`,
        `labOrganizationId`, `status`, `dateFrom`, and `dateTo`.
      parameters:
        - name: caseId
          in: query
          schema: { type: string }
          description: Filter to invoices for a specific case.
        - name: practiceId
          in: query
          schema: { type: string }
          description: Filter to invoices for a specific provider org.
        - name: practiceIds
          in: query
          schema: { type: string }
          description: Comma-separated list of provider org IDs.
        - name: labOrganizationId
          in: query
          schema: { type: string }
          description: Filter to a specific lab org.
        - name: status
          in: query
          schema: { type: string }
          description: "Filter by status: 'open', 'all', or comma-separated statuses."
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
          description: Return invoices issued at or after this date.
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
          description: Return invoices issued at or before this date.
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResult"
        "401":
          description: Not authenticated
  /invoices/{invoiceId}:
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice (status, line items, metadata)
      description: |
        Partially updates an invoice. Requires a billing role (owner, admin,
        or billing) on the invoice's lab. Replaces the entire `items` array
        when supplied. Returns the updated invoice with totals.
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceInput"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetailResult"
        "400":
          description: Validation error
        "403":
          description: Caller lacks a billing role
        "404":
          description: Invoice not found
  /invoices/cases/{caseId}/generate-invoice:
    post:
      operationId: generateInvoiceForCase
      tags: [invoices]
      summary: Generate an invoice for a canonical case
      description: |
        Creates a draft invoice for the specified case, pre-filling line items
        from the case's restorations and display metadata from the case fields.
        Idempotent — returns the existing invoice when one with the derived
        invoice number already exists. Requires a billing role on the case's lab.
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                layoutPresetId:
                  type: string
                  nullable: true
                  description: Optional layout preset to apply to the generated invoice.
      responses:
        "201":
          description: Generated (or existing) invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetailResult"
        "403":
          description: Caller lacks a billing role on the case's lab
        "404":
          description: Case not found
  /invoices/open:
    get:
      operationId: listOpenInvoices
      tags: [invoices]
      summary: List open invoices for a provider/practice (Receive Payments)
      description: |
        Returns the open (issued or partially-paid) invoices the lab can
        currently receive payments against. Requires the caller to have a
        billing role (owner, admin, or billing) in `labOrganizationId`.
      parameters:
        - name: labOrganizationId
          in: query
          required: true
          schema: { type: string }
          description: Lab organization to scope the invoices to.
        - name: providerOrganizationId
          in: query
          required: true
          schema: { type: string }
          description: Provider/practice to filter open invoices for.
      responses:
        "200":
          description: Open-invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenInvoiceListResult"
        "403":
          description: Caller lacks a billing role on the lab.
  /admin/backup/restore:
    post:
      operationId: restoreBackup
      tags: [backup]
      summary: Restore a backup from an uploaded .zip.enc file
      description: |
        Upload a LabTrax `.zip.enc` backup file. The server validates the file,
        decrypts it, and restores the database and media files asynchronously.
        Returns 202 immediately; poll `/admin/backup/restore/status` for progress.
        Requires the `X-Platform-Admin-Secret` header. Only one restore can run
        at a time (returns 409 if another is already in progress).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  description: |
                    The encrypted .zip.enc backup file (max 2 GB). Represented as
                    `type: string` (not `format: binary`) so the generated client
                    does not depend on the DOM `File` global. Pass a Blob/File at runtime.
      responses:
        "202":
          description: Restore started — poll /admin/backup/restore/status for progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreStartResult"
        "400":
          description: No file uploaded or invalid file
        "403":
          description: Admin access required
        "409":
          description: Another restore is already in progress
  /admin/backup/restore/status:
    get:
      operationId: getRestoreStatus
      tags: [backup]
      summary: Get current restore phase and progress
      description: |
        Returns the current restore state for polling. The `phase` field cycles
        through `idle → uploading → validating → decrypting → restoring_db →
        restoring_media → done | error`. Requires the `X-Platform-Admin-Secret`
        header.
      responses:
        "200":
          description: Current restore state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreStatusResult"
        "403":
          description: Admin access required
  /admin/backup/restore/from-onedrive:
    post:
      operationId: restoreBackupFromOneDrive
      tags: [backup]
      summary: Restore the most-recent backup from OneDrive
      description: |
        The server lists the configured OneDrive backup folder, downloads the
        most-recently-modified `.zip.enc` file, and runs the same restore
        pipeline as `POST /admin/backup/restore`. Returns 202 immediately.
        Requires the `X-Platform-Admin-Secret` header. Returns 409 if a
        restore is already in progress.
      responses:
        "202":
          description: Restore from OneDrive started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreStartResult"
        "403":
          description: Admin access required
        "409":
          description: Another restore is already in progress
  /admin/backup/run:
    post:
      operationId: runBackupNow
      tags: [backup]
      summary: Run an immediate full backup
      description: |
        Triggers an immediate full backup (all cases, invoices, media, etc.)
        to the chosen destination. Requires the X-Platform-Admin-Secret header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupRunRequest"
      responses:
        "200":
          description: Backup completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupRunResult"
        "400":
          description: Invalid destination or missing path
        "403":
          description: Admin access required
  /admin/backup/schedule:
    get:
      operationId: getBackupSchedule
      tags: [backup]
      summary: Get the current backup schedule configuration
      description: |
        Returns the recurring backup schedule stored in system settings.
        Requires the X-Platform-Admin-Secret header.
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupScheduleResult"
        "403":
          description: Admin access required
    put:
      operationId: saveBackupSchedule
      tags: [backup]
      summary: Save the recurring backup schedule
      description: |
        Persists the schedule configuration to system settings and restarts
        the in-process recurring backup job. Requires the
        X-Platform-Admin-Secret header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupScheduleInput"
      responses:
        "200":
          description: Schedule saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupScheduleResult"
        "400":
          description: Invalid interval or destination
        "403":
          description: Admin access required
    delete:
      operationId: disableBackupSchedule
      tags: [backup]
      summary: Disable the recurring backup schedule
      description: |
        Sets the schedule to disabled in system settings and stops the
        in-process interval job. Requires the X-Platform-Admin-Secret header.
      responses:
        "200":
          description: Schedule disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  enabled: { type: boolean }
        "403":
          description: Admin access required
  /rx-practice-aliases:
    get:
      operationId: getRxPracticeAlias
      tags: [cases]
      summary: Look up a saved Rx-name → practice alias for a lab
      description: |
        Returns the saved provider organization ID for the given
        (labOrganizationId, rxName) pair if one exists. The rxName is
        matched case-insensitively (normalized to lowercase). Returns
        `found: false` when no alias is stored. Lab-member auth required.
      parameters:
        - in: query
          name: labOrganizationId
          required: true
          schema: { type: string }
        - in: query
          name: rxName
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Alias lookup result (found or not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RxPracticeAliasResult"
        "400":
          description: Missing required query parameters
        "403":
          description: Caller is not a member of the lab
    post:
      operationId: upsertRxPracticeAlias
      tags: [cases]
      summary: Save or update an Rx-name → practice alias for a lab
      description: |
        Upserts an alias that maps a normalized Rx doctor/practice name to a
        specific provider organization for the given lab. On conflict
        (same lab + rxName) the providerOrganizationId is updated in place.
        Lab-member auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RxPracticeAliasInput"
      responses:
        "200":
          description: Alias saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RxPracticeAliasResult"
        "400":
          description: Missing or invalid fields
        "403":
          description: Caller is not a member of the lab
  /analyze-prescription:
    post:
      operationId: analyzePrescription
      tags: [ai]
      summary: Extract dental prescription fields from image(s) using AI
      description: |
        Accepts a base64-encoded primary image (JPEG, PNG, or PDF) and up to
        two additional page images. Uses OpenAI structured-output extraction to
        return patient name, doctor, practice, tooth numbers, material, shade,
        due date, rush flag, notes, and a confidence score. Returns 503 when AI
        is not configured, 400 for IMAGE_TOO_SMALL or HEIC payloads.
        Auth is optional — the caller may be authenticated or not.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzePrescriptionInput"
      responses:
        "200":
          description: AI extraction result (success may be false for refusals)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzePrescriptionResult"
        "400":
          description: Bad request — image missing, IMAGE_TOO_SMALL, or HEIC format
        "503":
          description: AI integration not configured
  /invoices/receive-payments:
    post:
      operationId: receiveInvoicePayments
      tags: [invoices]
      summary: Apply a single payment across multiple open invoices
      description: |
        QuickBooks-style "Receive Payments" — record one payment from a
        provider, distribute it across one or more open invoices, and post
        the combined deposit to a bank account in a single database
        transaction. Requires a billing role on `labOrganizationId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceivePaymentsInput"
      responses:
        "201":
          description: Payments recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceivePaymentsResult"
        "400":
          description: Invalid input or per-invoice amount exceeds balance.
        "403":
          description: Caller lacks a billing role on the lab.
  /organizations/{labId}/providers:
    get:
      operationId: listLabProviders
      tags: [organizations]
      summary: List provider practices for a lab
      description: |
        Returns the provider practices (organizations of type "provider")
        that belong to the given lab via parentLabOrganizationId. Available
        to any active member of the lab, so the mobile Rx review screen can
        browse and pick an existing practice without the admin-only,
        cases-derived /doctors/search endpoint. Reads the organizations
        table directly, so practices created inline (with no cases yet)
        still appear. Soft-deleted practices are excluded.
      parameters:
        - name: labId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Provider practices for the lab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabProviderList"
        "403":
          description: Caller is not an active member of this lab.
        "404":
          description: Lab not found.
  /organizations/{organizationId}/logo-placements:
    patch:
      operationId: updateOrganizationLogoPlacements
      tags: [cases]
      summary: Update logo placement preferences for an organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [placements]
              properties:
                placements:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Placements updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  logoplacements:
                    type: array
                    items:
                      type: string
                    nullable: true
        "403":
          description: Caller lacks admin access on this organization.
        "404":
          description: Organization not found.
  /invoices/{invoiceId}/email:
    post:
      operationId: emailInvoice
      tags: [invoices]
      summary: Email a single invoice as a PDF attachment
      description: |
        Generates a PDF from the supplied base-64 payload and sends it to the
        practice's billing email (or the `to` override). Requires a billing
        role (owner, admin, or billing) on the lab organization that owns the
        invoice. Returns 503 when SMTP is not configured.
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, message, filename, pdfBase64]
              properties:
                to:
                  type: string
                  format: email
                  description: Recipient override; falls back to practice billingEmail.
                cc:
                  type: array
                  items: { type: string, format: email }
                  maxItems: 10
                subject:
                  type: string
                  minLength: 1
                  maxLength: 500
                message:
                  type: string
                  minLength: 1
                  maxLength: 20000
                filename:
                  type: string
                  minLength: 1
                  maxLength: 200
                pdfBase64:
                  type: string
                  description: Base-64 encoded PDF bytes.
                attachmentIds:
                  type: array
                  items: { type: string }
                  maxItems: 20
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                required: [sentAt, to, cc]
                properties:
                  sentAt: { type: string, format: date-time }
                  to: { type: string }
                  cc:
                    type: array
                    items: { type: string }
        "400":
          description: No billing email on file and no `to` override supplied, or invalid PDF.
        "403":
          description: Caller lacks a billing role on the lab.
        "503":
          description: SMTP not configured.
  /invoices/{invoiceId}/sms:
    post:
      operationId: smsInvoice
      tags: [invoices]
      summary: Send a single invoice notification via SMS
      description: |
        Sends an SMS message to the practice's phone number (or the `to`
        override) notifying them of the invoice. Requires a billing role
        (owner, admin, or billing) on the lab. Returns 503 when Twilio is
        not configured.
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                to:
                  type: string
                  description: Phone number override; falls back to practice phone.
                message:
                  type: string
                  minLength: 1
                  maxLength: 1500
      responses:
        "200":
          description: SMS sent
          content:
            application/json:
              schema:
                type: object
                required: [sentAt, to]
                properties:
                  sentAt: { type: string, format: date-time }
                  to: { type: string }
        "400":
          description: No phone on file and no `to` override supplied.
        "403":
          description: Caller lacks a billing role on the lab.
        "503":
          description: Twilio not configured.
  /messenger/users/search:
    get:
      operationId: searchMessengerUsers
      tags: [messenger]
      summary: Search users to start a conversation with
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
          description: Search query (username, first name, last name)
      responses:
        "200":
          description: List of matching users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessengerUsersResult"
  /messenger/conversations:
    get:
      operationId: listConversations
      tags: [messenger]
      summary: List all conversations for the current user
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResult"
    post:
      operationId: createConversation
      tags: [messenger]
      summary: Find or create a 1-to-1 conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "200":
          description: Conversation found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConversationResult"
  /messenger/conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [messenger]
      summary: Get paginated message history for a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: before
          schema: { type: string }
          description: Cursor — return messages before this message ID
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Message list (chronological)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResult"
    post:
      operationId: sendMessage
      tags: [messenger]
      summary: Send a message to a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageResult"
  /messenger/conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [messenger]
      summary: Mark conversation as read up to a given message
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadInput"
      responses:
        "200":
          description: Marked as read
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user account (base role only; 14-day trial starts)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserInput"
      responses:
        "200":
          description: Account created and session issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Validation error
        "409":
          description: Username or email already in use
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Authenticate with an identifier (username, email, or account number) and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login complete, or a 2FA challenge is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Rotate the refresh token and issue a new access token (reuse detection)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSessionInput"
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResult"
        "401":
          description: Missing, expired, or reused refresh token
  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Revoke the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the authenticated user and the organizations they belong to
      responses:
        "200":
          description: Current user and memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResult"
        "401":
          description: Not authenticated
  /auth/sessions:
    get:
      operationId: listSessions
      tags: [auth]
      summary: List active sessions for the authenticated user
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResult"
        "401":
          description: Not authenticated
  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [auth]
      summary: Revoke a specific session by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Not authenticated
  /send-email-code:
    post:
      operationId: sendEmailVerificationCode
      tags: [auth]
      summary: Send a one-time email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailCodeInput"
      responses:
        "200":
          description: Code sent (demoCode present only in dev when email is unconfigured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSendResult"
  /verify-email-code:
    post:
      operationId: verifyEmailCode
      tags: [auth]
      summary: Verify a one-time email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailCodeInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationVerifyResult"
  /send-phone-code:
    post:
      operationId: sendPhoneVerificationCode
      tags: [auth]
      summary: Send a one-time SMS verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPhoneCodeInput"
      responses:
        "200":
          description: Code sent (demoCode present only in dev when SMS is unconfigured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSendResult"
  /verify-phone-code:
    post:
      operationId: verifyPhoneCode
      tags: [auth]
      summary: Verify a one-time SMS verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneCodeInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationVerifyResult"
  /organizations:
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create a lab or provider organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationInput"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResult"
        "401":
          description: Not authenticated
  /organizations/{organizationId}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get an organization the caller can access
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResult"
        "403":
          description: Caller does not belong to this organization
        "404":
          description: Not found
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update an organization (admin only)
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationInput"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResult"
        "403":
          description: Insufficient role
  /organizations/{organizationId}/invites:
    post:
      operationId: createInvitation
      tags: [organizations]
      summary: Invite a user to an organization (admin only). Invite messages carry no PHI.
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationInput"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResult"
        "409":
          description: A pending invite already exists for that email
    get:
      operationId: listInvitations
      tags: [organizations]
      summary: List invitations for an organization (admin only)
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResult"
  /organizations/invites/pending-for-me:
    get:
      operationId: listMyPendingInvitations
      tags: [organizations]
      summary: List pending invitations addressed to the authenticated user
      responses:
        "200":
          description: Pending invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResult"
  /organizations/invites/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [organizations]
      summary: Accept an invitation by token (the caller's email must match the invite)
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResult"
        "403":
          description: Invite does not belong to the caller
        "410":
          description: Invite expired or invalid
  /organizations/invites/{inviteId}/decline:
    post:
      operationId: declineInvitation
      tags: [organizations]
      summary: Decline an invitation
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invitation declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /organizations/invites/{inviteId}/cancel:
    post:
      operationId: revokeInvitation
      tags: [organizations]
      summary: Cancel/revoke a pending invitation (admin only)
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invitation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /organizations/memberships/{membershipId}:
    patch:
      operationId: updateMembership
      tags: [organizations]
      summary: Update a membership's role or status (admin only; role ceiling enforced)
      parameters:
        - in: path
          name: membershipId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipInput"
      responses:
        "200":
          description: Updated membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipResult"
        "403":
          description: Cannot assign a role above your own
    delete:
      operationId: removeMembership
      tags: [organizations]
      summary: Remove a membership (admin only)
      parameters:
        - in: path
          name: membershipId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Membership removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit-log entries for an organization (admin only). Contract for Phase 2 implementation.
      parameters:
        - in: query
          name: organizationId
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
        - in: query
          name: before
          description: ISO timestamp cursor — return entries created before this time
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Audit-log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResult"
        "403":
          description: Insufficient role
components:
  schemas:
    SafeUser:
      type: object
      description: User fields safe to return to clients (no password/secret material).
      properties:
        id: { type: string }
        username: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        initials: { type: string, nullable: true }
        userType: { type: string, nullable: true }
        role: { type: string, nullable: true }
        licenseNumber: { type: string, nullable: true }
        practiceName: { type: string, nullable: true }
        doctorName: { type: string, nullable: true }
        practiceAddress: { type: string, nullable: true }
        practicePhone: { type: string, nullable: true }
        phoneContactName: { type: string, nullable: true }
        accountNumber: { type: string, nullable: true }
        platformAccountNumber:
          type: string
          nullable: true
          description: Immutable platform-wide account number. Canonical format is `<TYPE>-<YEAR>-<SEQUENCE>-<PHONE>` (e.g. `L-2026-3-5551234567`); legacy accounts use the older `<seq><YY><F><L>` format.
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When the user's email was verified, or null if unverified.
        phoneVerifiedAt:
          type: string
          format: date-time
          nullable: true
          description: When the user's phone was verified, or null if unverified.
        wantsUpdates: { type: boolean, nullable: true }
        workStatus: { type: string, nullable: true }
        profilePhotoUrl: { type: string, nullable: true }
      required: [id]
    RegisterUserInput:
      type: object
      description: New-account registration. The global role is always the base user role; account/platform numbers are allocated server-side and never grant privilege.
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 12
          pattern: "^[a-zA-Z0-9_]{3,12}$"
          description: 3–12 characters, letters/numbers/underscore only. Unique case-insensitively.
        password: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        userType:
          type: string
          enum: [lab, provider]
          nullable: true
        practiceName: { type: string, nullable: true }
        doctorName: { type: string, nullable: true }
        createOrganization:
          type: boolean
          nullable: true
          description: When true, also creates the user's lab organization and an owner membership.
        clientType:
          type: string
          enum: [web, mobile, desktop]
          nullable: true
        wantsUpdates: { type: boolean, nullable: true }
      required: [username, password]
    AuthResult:
      type: object
      description: Bare (non-enveloped) auth response. Tokens are present only for non-web (bearer) clients; web clients receive httpOnly cookies instead.
      properties:
        success: { type: boolean }
        accessToken: { type: string, nullable: true }
        refreshToken: { type: string, nullable: true }
        user:
          oneOf:
            - $ref: "#/components/schemas/SafeUser"
          nullable: true
        message: { type: string, nullable: true }
        organization:
          type: object
          nullable: true
          additionalProperties: true
        pendingJoinRequest:
          type: object
          nullable: true
          additionalProperties: true
      required: [success]
    LoginInput:
      type: object
      description: Provide either username or identifier (identifier matches username, email, or platform account number — case-insensitive).
      properties:
        username: { type: string, nullable: true }
        identifier: { type: string, nullable: true }
        password: { type: string }
        deviceName: { type: string, nullable: true }
        clientType:
          type: string
          enum: [web, mobile, desktop]
          nullable: true
      required: [password]
    LoginResult:
      type: object
      description: Completed login response with session tokens.
      properties:
        success: { type: boolean, nullable: true }
        accessToken: { type: string, nullable: true }
        refreshToken: { type: string, nullable: true }
        user:
          oneOf:
            - $ref: "#/components/schemas/SafeUser"
          nullable: true
        message: { type: string, nullable: true }
        organization:
          type: object
          nullable: true
          additionalProperties: true
        pendingJoinRequest:
          type: object
          nullable: true
          additionalProperties: true
    RefreshSessionInput:
      type: object
      description: Refresh token is optional in the body — web clients send it via httpOnly cookie.
      properties:
        refreshToken: { type: string, nullable: true }
    AuthTokensResult:
      type: object
      description: Enveloped token-rotation response (ok + data). Tokens are present only for bearer clients.
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
          required: [accessToken]
      required: [ok, data]
    CurrentUserMembership:
      type: object
      properties:
        id: { type: string }
        role: { type: string, nullable: true }
        status: { type: string, nullable: true }
        organizationId: { type: string, nullable: true }
        organization:
          type: object
          nullable: true
          additionalProperties: true
      required: [id]
    CurrentUserResult:
      type: object
      properties:
        success: { type: boolean }
        user:
          oneOf:
            - $ref: "#/components/schemas/SafeUser"
          nullable: true
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/CurrentUserMembership"
      required: [success, memberships]
    SessionInfo:
      type: object
      properties:
        id: { type: string }
        deviceName: { type: string, nullable: true }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        createdAt: { type: string, nullable: true }
        expiresAt: { type: string }
        current: { type: boolean }
        isSuspicious: { type: boolean }
      required: [id, expiresAt, current, isSuspicious]
    SessionListResult:
      type: object
      properties:
        success: { type: boolean }
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionInfo"
      required: [success, sessions]
    SendEmailCodeInput:
      type: object
      properties:
        email: { type: string }
      required: [email]
    VerifyEmailCodeInput:
      type: object
      properties:
        email: { type: string }
        code: { type: string }
      required: [email, code]
    SendPhoneCodeInput:
      type: object
      properties:
        phone: { type: string }
      required: [phone]
    VerifyPhoneCodeInput:
      type: object
      properties:
        phone: { type: string }
        code: { type: string }
      required: [phone, code]
    VerificationSendResult:
      type: object
      properties:
        success: { type: boolean }
        demoCode:
          type: string
          nullable: true
          description: Only returned in development when the email/SMS provider is unconfigured. Never present in production.
      required: [success]
    VerificationVerifyResult:
      type: object
      properties:
        success: { type: boolean }
        verified: { type: boolean }
      required: [success, verified]
    OrganizationType:
      type: string
      enum: [lab, provider]
    OrganizationRole:
      type: string
      enum: [owner, admin, user, billing, read_only]
    MembershipStatus:
      type: string
      enum: [active, pending, invited, suspended]
    CreateOrganizationInput:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/OrganizationType"
        name: { type: string }
        displayName: { type: string, nullable: true }
        billingEmail: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        addressLine1: { type: string, nullable: true }
        addressLine2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip: { type: string, nullable: true }
        isActive: { type: boolean, nullable: true }
        statementEmailOptOut: { type: boolean, nullable: true }
        defaultCaseDueDays: { type: integer, nullable: true }
        capCaseDueToDefault: { type: boolean, nullable: true }
        licenseNumber:
          type: string
          nullable: true
          description: Lab license / registration number. Required when creating a lab; ignored on provider orgs.
        doctorName:
          type: string
          nullable: true
          description: Provider orgs only — feeds account-number derivation; not persisted on the org row.
        accountNumber:
          type: string
          nullable: true
          description: Optional caller override; must be unique within the parent lab.
        parentLabOrganizationId:
          type: string
          nullable: true
          description: Provider orgs only; falls back to the caller's primary lab membership.
      required: [type, name]
    UpdateOrganizationInput:
      type: object
      description: Partial update. Type and parent lab cannot be changed.
      properties:
        name: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        billingEmail: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        addressLine1: { type: string, nullable: true }
        addressLine2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip: { type: string, nullable: true }
        isActive: { type: boolean, nullable: true }
        statementEmailOptOut: { type: boolean, nullable: true }
        defaultCaseDueDays: { type: integer, nullable: true }
        capCaseDueToDefault: { type: boolean, nullable: true }
        licenseNumber: { type: string, nullable: true }
        accountNumber: { type: string, nullable: true }
    Organization:
      type: object
      description: Organization row (lab or provider). Shape mirrors the organizations table; extra fields may be present.
      additionalProperties: true
      properties:
        id: { type: string }
        type:
          $ref: "#/components/schemas/OrganizationType"
        name: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        parentLabOrganizationId: { type: string, nullable: true }
        accountNumber: { type: string, nullable: true }
        platformAccountNumber: { type: string, nullable: true }
        licenseNumber: { type: string, nullable: true }
        defaultCaseDueDays: { type: integer, nullable: true }
        capCaseDueToDefault: { type: boolean, nullable: true }
        isActive: { type: boolean, nullable: true }
      required: [id]
    OrganizationResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/Organization"
      required: [ok, data]
    CreateInvitationInput:
      type: object
      properties:
        email: { type: string }
        phone: { type: string, nullable: true }
        roleToAssign:
          $ref: "#/components/schemas/OrganizationRole"
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
          nullable: true
      required: [email, roleToAssign]
    Invitation:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        organizationId: { type: string, nullable: true }
        labId: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        roleToAssign: { type: string, nullable: true }
        status: { type: string, nullable: true }
        token: { type: string, nullable: true }
        expiresAt: { type: string, nullable: true }
      required: [id]
    InvitationResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/Invitation"
      required: [ok, data]
    InvitationListResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invitation"
      required: [ok, data]
    AcceptInvitationResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: object
          properties:
            accepted: { type: boolean }
          required: [accepted]
      required: [ok, data]
    UpdateMembershipInput:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/OrganizationRole"
        status:
          $ref: "#/components/schemas/MembershipStatus"
    Membership:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        labId: { type: string, nullable: true }
        userId: { type: string, nullable: true }
        role: { type: string, nullable: true }
        status: { type: string, nullable: true }
      required: [id]
    MembershipResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/Membership"
      required: [ok, data]
    SuccessEnvelope:
      type: object
      description: Generic enveloped success response (ok + data).
      properties:
        ok: { type: boolean }
        data:
          type: object
          additionalProperties: true
      required: [ok]
    AuditLogEntry:
      type: object
      properties:
        id: { type: string }
        userId: { type: string, nullable: true }
        organizationId: { type: string, nullable: true }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string, nullable: true }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        beforeJson:
          nullable: true
        afterJson:
          nullable: true
        metadataJson:
          nullable: true
        createdAt: { type: string, nullable: true }
      required: [id, action, entityType]
    AuditLogListResult:
      type: object
      properties:
        ok: { type: boolean }
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
      required: [ok, data]
    CanonicalActivityEntry:
      type: object
      properties:
        id: { type: string, nullable: true }
        type: { type: string, nullable: true }
        timestamp:
          nullable: true
          oneOf:
            - type: number
            - type: string
        description: { type: string, nullable: true }
        imageUri: { type: string, nullable: true }

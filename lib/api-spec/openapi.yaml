        ok: { type: boolean }
        data:
          type: object
          description: Invoice row with line items and totals
          additionalProperties: true
          properties:
            frozen:
              type: boolean
              description: True when the invoice is permanently frozen because the linked case was deleted.
            caseDeletedAt:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of case deletion that triggered the freeze.
            caseDeletedByUserId:
              type: string

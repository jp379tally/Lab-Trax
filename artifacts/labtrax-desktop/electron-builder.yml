appId: com.labtrax.desktop
productName: LabTrax
directories:
  output: electron-dist
files:
  - dist/electron-app/**
  - electron/main.cjs
  - electron/icon.png
win:
  target: nsis
  icon: electron/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

appId: com.labtrax.desktop
productName: LabTrax
directories:
  output: electron-dist
files:
  - dist/electron-app/**
  # Include the entire electron/ directory so sibling modules
  # (itero-poller.cjs, itero-helpers.cjs, platform-admin.cjs, auth-store.cjs,
  # entitlements.mac.plist, icon.png) are present at runtime. Listing only
  # main.cjs + preload.cjs caused "Cannot find module './itero-poller.cjs'"
  # on every launch of the packaged Windows app.
  - electron/**/*
  - "!electron/__tests__/**"
  - "!electron/**/*.test.*"

# ─── Windows ────────────────────────────────────────────────────────────────
win:
  target: nsis
  icon: electron/icon.png
  # Code-signing is performed automatically by electron-builder when the
  # CSC_LINK and CSC_KEY_PASSWORD environment variables are present.
  #
  # CSC_LINK     — base64-encoded PFX certificate file (OV or EV).
  #                Encode your .pfx with:
  #                  certutil -encode certificate.pfx certificate.b64
  #                  (Windows) or: base64 -w 0 certificate.pfx
  #                Store the resulting string as the WINDOWS_CERTIFICATE
  #                GitHub Actions secret.
  # CSC_KEY_PASSWORD — password protecting the PFX.
  #                Store it as the WINDOWS_CERTIFICATE_PASSWORD secret.
  #
  # For EV certificates stored on a hardware token or cloud HSM (e.g.
  # Azure Trusted Signing / DigiCert KeyLocker), set the appropriate
  # additional env vars for that provider and point signtool at the token.
  # The SHA-256 timestamp below remains correct for all certificate types.
  #
  # Signing hash algorithm + RFC 3161 timestamp server are now nested under
  # signtoolOptions in electron-builder >=26.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    rfc3161TimeStampServer: http://timestamp.sectigo.com
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # Stable filename so admins (and users with bookmarked URLs) always pull
  # the same asset name. The default name embeds the version
  # ("LabTrax Setup 1.2.3.exe"), which breaks the stable /downloads/
  # URL the API serves.
  artifactName: LabTrax-Setup.${ext}
  # Explicit, stable GUID locks the app identity so Windows always treats
  # a new build as an update to the same installed application rather than
  # a new one. Without an explicit GUID, electron-builder derives it from
  # appId — making it explicit here prevents any accidental regeneration if
  # appId ever drifts, which would create a second "application" in
  # Programs & Features and leave all pinned taskbar shortcuts pointing at
  # the old install path.
  guid: "{6E4A8B2C-1D3F-4A5B-9C0D-EF1234567890}"

# ─── macOS ──────────────────────────────────────────────────────────────────
mac:
  target:
    # DMG for standard distribution; zip is used by the auto-updater.
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: electron/icon.png
  # Hardened Runtime is mandatory for notarization. Without it Apple's
  # notarization service rejects the submission.
  hardenedRuntime: true
  # Skip the local Gatekeeper assessment during the build — the assessment
  # runs against the developer's own machine and is irrelevant in CI.
  gatekeeperAssess: false
  # Entitlements grant the specific runtime permissions Electron needs while
  # staying within the Hardened Runtime sandbox. See
  # electron/entitlements.mac.plist for the full list.
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  # Signing identity is resolved automatically from the certificate loaded via
  # CSC_LINK / CSC_KEY_PASSWORD. To pin a specific identity (e.g. when
  # multiple Developer ID certificates are present in the keychain), set:
  #   identity: "Developer ID Application: Your Name (TEAMID)"
  # Notarization: electron-builder submits the signed app to Apple's
  # notarization service and staples the ticket. Required env vars:
  #   APPLE_ID                  — Apple ID email used to sign in to App Store Connect
  #   APPLE_APP_SPECIFIC_PASSWORD — app-specific password for that Apple ID
  #   APPLE_TEAM_ID             — 10-character Team ID from developer.apple.com
  # See .github/workflows/build-macos.yml for how these are wired up.
  # In electron-builder >=26, notarize is a boolean. Team ID is taken from
  # the APPLE_TEAM_ID env var (or the Developer ID certificate) automatically.
  notarize: true
dmg:
  # The DMG itself does not need a separate signature — the app bundle inside
  # it is already signed and notarized.
  sign: false

# ─── Publish ─────────────────────────────────────────────────────────────────
# Using the "generic" publish provider so electron-updater points at the
# same App Storage-backed API server that already serves the installer ZIPs.
# This replaces the GitHub Releases provider, which requires a GitHub remote
# and GH_TOKEN — neither is available in the Replit environment where this
# app is built and published.
#
# UPDATE_FEED_URL (set by scripts/desktop-build-publish.sh before calling
# electron-builder) is expanded here and baked into resources/app-update.yml
# inside the packaged app. Every installed copy reads that file to know where
# to fetch latest.yml at runtime — no environment variable is required on
# the end-user's machine.
#
# scripts/electron-build.mjs passes an additional --config override when
# UPDATE_FEED_URL is present. That override is kept so ad-hoc test builds
# (local http-server feed — see docs/auto-update-runbook.md) can point at a
# different URL without modifying this file.
publish:
  provider: generic
  url: ${UPDATE_FEED_URL}

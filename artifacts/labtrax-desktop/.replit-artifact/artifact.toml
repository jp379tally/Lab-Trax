kind = "web"
previewPath = "/desktop/"
title = "LabTrax Desktop"
version = "1.0.0"
id = "artifacts/labtrax-desktop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/desktop/" ]
localPort = 18803

[services.development]
run = "pnpm --filter @workspace/labtrax-desktop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/labtrax-desktop", "run", "build" ]
publicDir = "artifacts/labtrax-desktop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18803"
BASE_PATH = "/desktop/"
